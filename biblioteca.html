<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Biblioteca — Victor IA Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: #070809;
      color: #F8F7F5;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(248,247,245,0.07);
    }
    h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
    .logo {
      width: 32px;
      height: 32px;
      background: #FFAA17;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #070809;
      margin-right: 12px;
    }
    .header-left { display: flex; align-items: center; }
    .stats { display: flex; gap: 30px; font-size: 13px; color: rgba(248,247,245,0.6); }
    .filters { display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; }
    .filter-btn {
      background: transparent;
      border: 1px solid rgba(248,247,245,0.14);
      color: rgba(248,247,245,0.7);
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: all 0.2s;
    }
    .filter-btn:hover,
    .filter-btn.active {
      border-color: #FFAA17;
      color: #FFAA17;
      background: rgba(255,170,23,0.08);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .asset-card {
      background: #0E0F12;
      border: 1px solid rgba(248,247,245,0.07);
      border-radius: 6px;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .asset-card:hover {
      border-color: #FFAA17;
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(255,170,23,0.1);
    }
    .asset-preview {
      width: 100%;
      height: 160px;
      background: #131418;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .asset-preview img,
    .asset-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .asset-preview.no-media {
      background: linear-gradient(135deg, #131418 0%, #0E0F12 100%);
      font-size: 40px;
    }
    .asset-icon {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      padding: 6px 10px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #FFAA17;
    }
    .asset-info {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .asset-action {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #FFAA17;
      margin-bottom: 6px;
    }
    .asset-date {
      font-size: 12px;
      color: rgba(248,247,245,0.4);
      margin-bottom: 12px;
    }
    .asset-actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 8px;
      border: 1px solid rgba(248,247,245,0.14);
      background: transparent;
      color: rgba(248,247,245,0.6);
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      border-color: #FFAA17;
      color: #FFAA17;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: rgba(248,247,245,0.4);
    }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255,170,23,0.2);
      border-top-color: #FFAA17;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: rgba(248,247,245,0.4);
    }
    .empty-icon {
      font-size: 60px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      position: relative;
      max-width: 90%;
      max-height: 90%;
      background: #0E0F12;
      border-radius: 8px;
      padding: 20px;
      border: 1px solid rgba(248,247,245,0.1);
    }
    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,170,23,0.2);
      border: none;
      color: #FFAA17;
      width: 36px;
      height: 36px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-media {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="logo">V</div>
        <h1>Biblioteca de Activos</h1>
      </div>
      <div class="stats">
        <div>Total: <strong id="stat-total">0</strong></div>
        <div>Hoy: <strong id="stat-today">0</strong></div>
      </div>
    </header>

    <div class="filters">
      <button class="filter-btn active" data-filter="todos">Todos</button>
      <button class="filter-btn" data-filter="imagen">Imágenes</button>
      <button class="filter-btn" data-filter="video">Videos</button>
      <button class="filter-btn" data-filter="presentacion">Presentaciones</button>
      <button class="filter-btn" data-filter="web">Web</button>
      <button class="filter-btn" data-filter="voice">Voice</button>
    </div>

    <div id="content" class="grid"></div>
  </div>

  <!-- Modal Viewer -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    let allAssets = [];
    let currentFilter = 'todos';

    const ICONS = {
      imagen: '🖼️',
      video: '🎬',
      presentacion: '📊',
      web: '🌐',
      voice: '🎤',
      capacitacion: '📚',
      admin: '⚙️'
    };

    async function loadAssets(filter = 'todos') {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="loading"><div class="spinner"></div><p>Cargando...</p></div>`;

      try {
        // Leer directamente de Supabase
        const SUPABASE_URL = 'https://oemegqzcdxzfctxbizyna.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lbWVncXpjZHh6ZmN0eGJpenlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTk5NTU4OTEsImV4cCI6MjAzNTUzMTg5MX0.sb_publishable_qCN8yH5VohQrc9weY_L2set';

        let url = `${SUPABASE_URL}/rest/v1/tracker_results?select=*&order=created_at.desc&limit=200`;
        if (filter !== 'todos') {
          url += `&action=eq.${filter}`;
        }

        const resp = await fetch(url, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const rows = await resp.json();

        allAssets = (rows || []).map(row => ({
          jobId: row.job_id,
          url: row.result_url,
          type: row.result_type,
          action: row.action,
          createdAt: row.created_at,
          metadata: row.metadata
        })).filter(a => a.url);

        updateStats(allAssets.length);
        renderAssets(allAssets);
      } catch (err) {
        console.error('Error:', err);
        content.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>Error cargando biblioteca</p></div>`;
      }
    }

    function updateStats(total) {
      document.getElementById('stat-total').textContent = total;

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const todayCount = allAssets.filter(a => {
        const assetDate = new Date(a.createdAt);
        assetDate.setHours(0, 0, 0, 0);
        return assetDate.getTime() === today.getTime();
      }).length;

      document.getElementById('stat-today').textContent = todayCount;
    }

    function renderAssets(assets) {
      const content = document.getElementById('content');

      if (!assets || assets.length === 0) {
        content.innerHTML = `<div class="empty" style="grid-column: 1/-1;"><div class="empty-icon">📭</div><p>No hay activos generados aún</p></div>`;
        return;
      }

      content.innerHTML = assets.map((asset, idx) => {
        const isImage = isImageAsset(asset);
        const isVideo = isVideoAsset(asset);
        return `
        <div class="asset-card">
          <div class="asset-preview ${!asset.url ? 'no-media' : ''}" onclick="openModal(${idx})" style="cursor: pointer;">
            ${isImage && asset.url ? `<img src="${asset.url}" alt="preview" onerror="this.style.display='none'">` : ''}
            ${isVideo && asset.url ? `<video src="${asset.url}"></video>` : ''}
            ${!asset.url ? ICONS[asset.action] || '📦' : ''}
            <div class="asset-icon">${asset.action}</div>
          </div>
          <div class="asset-info">
            <div class="asset-action">${asset.action}</div>
            <div class="asset-date">${new Date(asset.createdAt).toLocaleDateString('es')} ${new Date(asset.createdAt).toLocaleTimeString('es')}</div>
            <div class="asset-actions">
              <button class="btn" onclick="openModal(${idx})">Ver</button>
              <button class="btn" onclick="copyUrl('${asset.url}')">Copiar</button>
              <button class="btn" onclick="downloadAsset('${asset.url}', '${asset.jobId}')">Descargar</button>
            </div>
          </div>
        </div>
      `;
      }).join('');
    }

    // Detecta si un activo es imagen: revisa el tipo, la accion y la extension de la URL.
    // Asi mostramos la imagen aunque result_type venga como "image", "imagen", vacio, etc.
    function isImageAsset(asset) {
      const t = (asset.type || '').toLowerCase();
      const a = (asset.action || '').toLowerCase();
      const u = (asset.url || '').toLowerCase();
      if (t.includes('image') || t.includes('imagen')) return true;
      if (a === 'imagen' || a === 'image') return true;
      if (/\.(png|jpe?g|webp|gif|avif)(\?|$)/.test(u)) return true;
      return false;
    }

    function isVideoAsset(asset) {
      const t = (asset.type || '').toLowerCase();
      const a = (asset.action || '').toLowerCase();
      const u = (asset.url || '').toLowerCase();
      if (t.includes('video')) return true;
      if (a === 'video') return true;
      if (/\.(mp4|webm|mov|m4v)(\?|$)/.test(u)) return true;
      return false;
    }

    function openModal(idx) {
      const asset = allAssets[idx];
      if (!asset) return;

      const modalBody = document.getElementById('modal-body');
      if (isImageAsset(asset)) {
        modalBody.innerHTML = `<img src="${asset.url}" alt="preview" class="modal-media" onerror="this.replaceWith(document.createTextNode('No se pudo cargar la imagen'))">`;
      } else if (isVideoAsset(asset)) {
        modalBody.innerHTML = `<video src="${asset.url}" controls class="modal-media"></video>`;
      } else {
        modalBody.innerHTML = `<div style="padding: 40px; text-align: center; color: rgba(248,247,245,0.5);">Sin preview disponible</div>`;
      }

      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    function copyUrl(url) {
      navigator.clipboard.writeText(url).then(() => {
        alert('URL copiada al portapapeles');
      });
    }

    function downloadAsset(url, jobId) {
      const a = document.createElement('a');
      a.href = url;
      a.download = `asset-${jobId}`;
      a.click();
    }

    // Event listeners
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.dataset.filter;
        loadAssets(currentFilter);
      });
    });

    // Close modal on background click
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') {
        closeModal();
      }
    });

    // Close modal on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    // Load on init
    loadAssets();

    // Refresh cada 30 segundos
    setInterval(() => loadAssets(currentFilter), 30000);
  </script>
</body>
</html>
