<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Página no encontrada</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#070809">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #070809;
      color: #F8F7F5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    h1 {
      font-size: 64px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #FFAA17 0%, #ff8c00 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 16px;
      color: rgba(248,247,245,0.7);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #FFAA17 0%, #ff8c00 100%);
      color: #1a1206;
      padding: 13px 32px;
      border-radius: 11px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: transform .12s, box-shadow .18s;
      box-shadow: 0 8px 24px -8px rgba(255,170,23,0.5);
    }
    a:hover { box-shadow: 0 10px 30px -8px rgba(255,170,23,0.65); }
    a:active { transform: scale(0.985); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>La página que buscas no existe. Verifica la URL e intenta de nuevo.</p>
    <a href="/">Volver al Tracker</a>
  </div>
</body>
</html>
