<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VICTOR IA · Tracker — Acceso</title>
  <meta name="description" content="Acceso al panel interno de VICTOR IA.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#070809">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&family=Cormorant+Display:ital,wght@1,400&display=swap" rel="stylesheet">

  <!-- Firebase SDK v10.12.2 compat (matches index.html) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:       #070809;
      --surface:  #0E0F12;
      --surface2: #131418;
      --amber:    #FFAA17;
      --bone:     #F8F7F5;
      --bone2:    rgba(248,247,245,0.55);
      --bone3:    rgba(248,247,245,0.32);
      --green:    #4ade80;
      --red:      #f87171;
      --border:   rgba(248,247,245,0.08);
      --border2:  rgba(248,247,245,0.14);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--bone);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* THE DOOR ambient backdrop */
    .glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .glow::before {
      content: "";
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 620px;
      height: 620px;
      background: radial-gradient(circle, rgba(255,170,23,0.10) 0%, transparent 65%);
      filter: blur(20px);
    }
    .glow::after {
      content: "";
      position: absolute;
      bottom: -25%;
      right: -10%;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(74,222,128,0.06) 0%, transparent 65%);
      filter: blur(30px);
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 410px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--surface2) 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 34px 34px;
      box-shadow: 0 40px 80px -30px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.02) inset;
    }

    .brand {
      text-align: center;
      margin-bottom: 30px;
    }
    .brand .door {
      font-size: 30px;
      line-height: 1;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 16px rgba(255,170,23,0.4));
    }
    .brand h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      font-size: 19px;
      letter-spacing: 0.5px;
    }
    .brand h1 b { color: var(--amber); font-weight: 600; }
    .brand p {
      margin-top: 7px;
      font-size: 12.5px;
      color: var(--bone2);
      font-family: 'Cormorant Display', serif;
      font-style: italic;
      font-size: 15px;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--bone2);
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 11px;
      padding: 13px 14px;
      color: var(--bone);
      font-size: 14px;
      font-family: inherit;
      transition: border-color .18s, box-shadow .18s;
    }
    .field input::placeholder { color: var(--bone3); }
    .field input:focus {
      outline: none;
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(255,170,23,0.12);
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 11px;
      padding: 13px 14px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform .12s, opacity .18s, background .18s, border-color .18s;
    }
    .btn:active { transform: scale(0.985); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--amber) 0%, #ff8c00 100%);
      color: #1a1206;
      margin-top: 6px;
      box-shadow: 0 8px 24px -8px rgba(255,170,23,0.5);
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 10px 30px -8px rgba(255,170,23,0.65); }

    .btn-oauth {
      background: var(--bg);
      color: var(--bone);
      border: 1px solid var(--border2);
    }
    .btn-oauth:hover:not(:disabled) { border-color: var(--amber); background: var(--surface2); }
    .btn-oauth svg { width: 18px; height: 18px; flex-shrink: 0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 16px;
      color: var(--bone3);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .oauth-row { display: flex; flex-direction: column; gap: 10px; }

    .msg {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      transition: color .2s;
    }
    .msg.error { color: var(--red); }
    .msg.ok    { color: var(--green); }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(26,18,6,0.35);
      border-top-color: #1a1206;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .btn-oauth .spinner { border: 2px solid var(--border2); border-top-color: var(--amber); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .foot {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--bone3);
    }
    .foot a { color: var(--bone2); text-decoration: none; }
    .foot a:hover { color: var(--amber); }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #FFFFFF; --surface: #F9FAFB; --surface2: #F1F3F5;
        --bone: #070809; --bone2: rgba(7,8,9,0.6); --bone3: rgba(7,8,9,0.38);
        --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14); --amber: #B87834;
      }
      .btn-primary { color: #fff; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="card">
    <div class="brand">
      <div class="door">🚪</div>
      <h1>VICTOR <b>IA</b> · Tracker</h1>
      <p>Cruza la puerta</p>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label for="email">Correo</label>
        <input type="email" id="email" name="email" placeholder="tu@correo.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="btnEmail">Entrar</button>
    </form>

    <div class="divider">o continúa con</div>

    <div class="oauth-row">
      <button type="button" class="btn btn-oauth" id="btnGoogle">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
        Google
      </button>
      <button type="button" class="btn btn-oauth" id="btnGithub">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.23c-3.34.73-4.04-1.42-4.04-1.42-.55-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.11-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6.01 0c2.29-1.55 3.3-1.23 3.3-1.23.65 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.62-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 24 12.5C24 5.87 18.63.5 12 .5z"/></svg>
        GitHub
      </button>
    </div>

    <div class="msg" id="msg"></div>

    <div class="foot">
      ¿No tienes cuenta? <a href="/signup.html">Regístrate</a>
    </div>
  </div>

  <script>
  (function(){
    "use strict";

    /* ── Firebase config (victor-ia-tracker) ── */
    var cfg = {
      apiKey: "AIzaSyBciNfVGjH5l3szzGVgatXlZvLvaoNsp14",
      authDomain: "victor-ia-tracker.firebaseapp.com",
      projectId: "victor-ia-tracker",
      storageBucket: "victor-ia-tracker.firebasestorage.app",
      messagingSenderId: "475376340371",
      appId: "1:475376340371:web:caaf70c5c4063edfcb6c66"
    };

    if (!firebase.apps.length) firebase.initializeApp(cfg);
    var auth = firebase.auth();
    try { auth.useDeviceLanguage(); } catch(e){}

    /* ── DOM refs ── */
    var form     = document.getElementById('loginForm');
    var emailEl  = document.getElementById('email');
    var passEl   = document.getElementById('password');
    var btnEmail = document.getElementById('btnEmail');
    var btnGoogle= document.getElementById('btnGoogle');
    var btnGithub= document.getElementById('btnGithub');
    var msgEl    = document.getElementById('msg');

    function setMsg(text, type){
      msgEl.textContent = text || '';
      msgEl.className = 'msg' + (type ? ' ' + type : '');
    }
    function loadingBtn(btn, on, label){
      if (on){
        btn.dataset.label = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>' + (label || '');
      } else {
        btn.disabled = false;
        if (btn.dataset.label) btn.innerHTML = btn.dataset.label;
      }
    }
    function disableAll(on){
      [btnEmail, btnGoogle, btnGithub].forEach(function(b){ b.disabled = on; });
    }

    /* ── Persist session like index.html expects, then redirect ── */
    function persistAndGo(user){
      try {
        localStorage.setItem('via_access_uid', user.uid);
        localStorage.setItem('via_access_email', user.email || '');
        localStorage.setItem('via_access_name', user.displayName || (user.email ? user.email.split('@')[0] : 'User'));
        localStorage.setItem('via_access_photo', user.photoURL || '');
        if (!localStorage.getItem('via_access_role')) localStorage.setItem('via_access_role', 'viewer');
        localStorage.setItem('via_access_authenticated', 'true');
      } catch(e){ console.warn('localStorage error', e); }
      setMsg('Acceso concedido. Entrando…', 'ok');
      setTimeout(function(){ window.location.href = '/'; }, 500);
    }

    /* ── Spanish error mapping ── */
    function esError(err){
      var code = (err && err.code) || '';
      var map = {
        'auth/invalid-email': 'El correo no es válido.',
        'auth/user-disabled': 'Esta cuenta está deshabilitada.',
        'auth/user-not-found': 'No existe una cuenta con ese correo.',
        'auth/wrong-password': 'Correo o contraseña incorrectos.',
        'auth/invalid-credential': 'Correo o contraseña incorrectos.',
        'auth/invalid-login-credentials': 'Correo o contraseña incorrectos.',
        'auth/missing-password': 'Escribe tu contraseña.',
        'auth/too-many-requests': 'Demasiados intentos. Espera un momento e inténtalo de nuevo.',
        'auth/network-request-failed': 'Error de red. Revisa tu conexión.',
        'auth/popup-closed-by-user': 'Cerraste la ventana antes de terminar.',
        'auth/cancelled-popup-request': 'Se canceló la ventana anterior.',
        'auth/popup-blocked': 'El navegador bloqueó la ventana. Permite pop-ups e inténtalo de nuevo.',
        'auth/account-exists-with-different-credential': 'Ya existe una cuenta con ese correo usando otro método de acceso.',
        'auth/unauthorized-domain': 'Este dominio no está autorizado en Firebase. Avisa al administrador.',
        'auth/operation-not-allowed': 'Este método de acceso no está habilitado. Avisa al administrador.'
      };
      return map[code] || ('No se pudo iniciar sesión. (' + (code || 'error desconocido') + ')');
    }

    /* ── Email / Password ── */
    form.addEventListener('submit', function(e){
      e.preventDefault();
      setMsg('');
      var email = emailEl.value.trim();
      var pass  = passEl.value;
      if (!email || !pass){ setMsg('Escribe tu correo y contraseña.', 'error'); return; }

      loadingBtn(btnEmail, true, 'Entrando…');
      disableAll(true);
      auth.signInWithEmailAndPassword(email, pass)
        .then(function(cred){ persistAndGo(cred.user); })
        .catch(function(err){
          console.warn('email login error', err);
          setMsg(esError(err), 'error');
          loadingBtn(btnEmail, false);
          disableAll(false);
        });
    });

    /* ── OAuth (popup, with redirect fallback) ── */
    function oauth(provider, btn){
      setMsg('');
      loadingBtn(btn, true, 'Conectando…');
      disableAll(true);
      auth.signInWithPopup(provider)
        .then(function(result){ persistAndGo(result.user); })
        .catch(function(err){
          console.warn('oauth popup error', err);
          if (err && (err.code === 'auth/popup-blocked')){
            // Fallback to full-page redirect
            auth.signInWithRedirect(provider).catch(function(err2){
              setMsg(esError(err2), 'error');
              loadingBtn(btn, false);
              disableAll(false);
            });
            return;
          }
          setMsg(esError(err), 'error');
          loadingBtn(btn, false);
          disableAll(false);
        });
    }

    btnGoogle.addEventListener('click', function(){
      var p = new firebase.auth.GoogleAuthProvider();
      p.setCustomParameters({ prompt: 'select_account' });
      oauth(p, btnGoogle);
    });

    btnGithub.addEventListener('click', function(){
      var p = new firebase.auth.GithubAuthProvider();
      p.addScope('read:user');
      p.addScope('user:email');
      oauth(p, btnGithub);
    });

    /* ── Handle redirect-based OAuth return + already-signed-in ── */
    auth.getRedirectResult()
      .then(function(result){
        if (result && result.user){ persistAndGo(result.user); }
      })
      .catch(function(err){
        if (err && err.code && err.code !== 'auth/no-auth-event'){
          console.warn('redirect result error', err);
          setMsg(esError(err), 'error');
        }
      });

    // If a Firebase session already exists, skip the form.
    auth.onAuthStateChanged(function(user){
      if (user && localStorage.getItem('via_access_authenticated') !== 'true'){
        persistAndGo(user);
      }
    });
  })();
  </script>
</body>
</html>
