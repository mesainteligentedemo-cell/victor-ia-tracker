<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VICTOR IA — Tracker Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #070809;
      --surface: #0E0F12;
      --amber: #FFAA17;
      --bone: #F8F7F5;
      --bone2: rgba(248,247,245,0.55);
      --green: #4ade80;
      --red: #f87171;
      --border: rgba(248,247,245,0.07);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #FFFFFF;
        --surface: #F9FAFB;
        --bone: #070809;
        --bone2: rgba(7,8,9,0.6);
        --border: rgba(0,0,0,0.08);
        --amber: #B87834;
      }
    }
    body {
      font-family: 'Space Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--bone);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 380px; width: 100%; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 36px 32px;
    }
    .logo { font-size: 34px; margin-bottom: 18px; line-height: 1; }
    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--amber);
      margin-bottom: 6px;
    }
    .subtitle { font-size: 12px; color: var(--bone2); margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--bone2);
      margin-bottom: 7px;
    }
    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--bone);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input::placeholder { color: var(--bone2); }
    input:focus { outline: none; border-color: var(--amber); }
    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      background: var(--amber);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.92; }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      color: var(--red);
      font-size: 12px;
      margin-bottom: 16px;
      padding: 9px 11px;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 6px;
      display: none;
    }
    .error.show { display: block; }
    .footnote {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--bone2);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">🚪</div>
      <h1>THE DOOR</h1>
      <p class="subtitle">Real-time monitoring system</p>

      <div class="error" id="errorMsg"></div>

      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="username" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn" id="loginBtn">Sign In</button>
      </form>

      <p class="footnote">Acceso seguro · Tracker Victor IA</p>
    </div>
  </div>

  <script>
    /* ── Login local (sin Firebase) — escribe via_access_* y redirige a / ── */
    (function () {
      'use strict';

      var form = document.getElementById('loginForm');
      var emailEl = document.getElementById('email');
      var passEl = document.getElementById('password');
      var btn = document.getElementById('loginBtn');
      var errorEl = document.getElementById('errorMsg');

      // Si ya hay sesión local activa, ir directo al tracker.
      try {
        if (localStorage.getItem('via_access_authenticated') === 'true') {
          window.location.replace('/index.html');
          return;
        }
      } catch (e) { /* localStorage bloqueado: continuar al formulario */ }

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('show');
      }
      function clearError() {
        errorEl.classList.remove('show');
        errorEl.textContent = '';
      }

      // Nombre legible a partir del email (antes de @)
      function nameFromEmail(email) {
        var raw = (email.split('@')[0] || 'Usuario').replace(/[._-]+/g, ' ').trim();
        return raw.replace(/\b\w/g, function (c) { return c.toUpperCase(); });
      }

      // UID determinista simple (sin dependencias)
      function uidFromEmail(email) {
        var h = 0;
        for (var i = 0; i < email.length; i++) {
          h = ((h << 5) - h + email.charCodeAt(i)) | 0;
        }
        return 'local_' + Math.abs(h).toString(36);
      }

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        clearError();

        var email = (emailEl.value || '').trim().toLowerCase();
        var password = passEl.value || '';

        if (!email || email.indexOf('@') === -1) {
          showError('Ingresa un email válido.');
          return;
        }
        if (password.length < 4) {
          showError('La contraseña debe tener al menos 4 caracteres.');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Entrando...';

        try {
          localStorage.setItem('via_access_uid', uidFromEmail(email));
          localStorage.setItem('via_access_email', email);
          localStorage.setItem('via_access_name', nameFromEmail(email));
          localStorage.setItem('via_access_photo', '');
          localStorage.setItem('via_access_role', 'viewer');
          localStorage.setItem('via_access_authenticated', 'true');

          window.location.replace('/index.html');
        } catch (e) {
          btn.disabled = false;
          btn.textContent = 'Sign In';
          showError('No se pudo guardar la sesión. Habilita el almacenamiento local del navegador.');
        }
      });
    })();
  </script>
</body>
</html>
