<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VICTOR IA · Tracker — Acceso</title>
  <meta name="description" content="Acceso al panel interno de VICTOR IA.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#070809">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&family=Cormorant+Display:ital,wght@1,400&display=swap" rel="stylesheet">

  <!-- Firebase SDK v10.12.2 compat (matches index.html) — usado solo para Email/Password -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:       #070809;
      --surface:  #0E0F12;
      --surface2: #131418;
      --amber:    #FFAA17;
      --bone:     #F8F7F5;
      --bone2:    rgba(248,247,245,0.55);
      --bone3:    rgba(248,247,245,0.32);
      --green:    #4ade80;
      --red:      #f87171;
      --border:   rgba(248,247,245,0.08);
      --border2:  rgba(248,247,245,0.14);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--bone);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* THE DOOR ambient backdrop */
    .glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .glow::before {
      content: "";
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 620px;
      height: 620px;
      background: radial-gradient(circle, rgba(255,170,23,0.10) 0%, transparent 65%);
      filter: blur(20px);
    }
    .glow::after {
      content: "";
      position: absolute;
      bottom: -25%;
      right: -10%;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(74,222,128,0.06) 0%, transparent 65%);
      filter: blur(30px);
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 410px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--surface2) 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 34px 34px;
      box-shadow: 0 40px 80px -30px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.02) inset;
    }

    .brand {
      text-align: center;
      margin-bottom: 30px;
    }
    .brand .door {
      font-size: 30px;
      line-height: 1;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 16px rgba(255,170,23,0.4));
    }
    .brand h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      font-size: 19px;
      letter-spacing: 0.5px;
    }
    .brand h1 b { color: var(--amber); font-weight: 600; }
    .brand p {
      margin-top: 7px;
      color: var(--bone2);
      font-family: 'Cormorant Display', serif;
      font-style: italic;
      font-size: 15px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 22px;
    }
    .tab {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--bone2);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      padding: 9px 10px;
      border-radius: 9px;
      cursor: pointer;
      transition: background .18s, color .18s;
    }
    .tab.active {
      background: var(--surface2);
      color: var(--bone);
      box-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    .pane { display: none; }
    .pane.active { display: block; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--bone2);
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 11px;
      padding: 13px 14px;
      color: var(--bone);
      font-size: 14px;
      font-family: inherit;
      transition: border-color .18s, box-shadow .18s;
    }
    .field input::placeholder { color: var(--bone3); }
    .field input:focus {
      outline: none;
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(255,170,23,0.12);
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 11px;
      padding: 13px 14px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform .12s, opacity .18s, background .18s, border-color .18s;
    }
    .btn:active { transform: scale(0.985); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--amber) 0%, #ff8c00 100%);
      color: #1a1206;
      margin-top: 6px;
      box-shadow: 0 8px 24px -8px rgba(255,170,23,0.5);
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 10px 30px -8px rgba(255,170,23,0.65); }

    .btn-ghost {
      background: var(--bg);
      color: var(--bone);
      border: 1px solid var(--border2);
      margin-top: 6px;
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--amber); background: var(--surface2); }

    .hint {
      font-size: 12px;
      color: var(--bone2);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    /* OAuth (disabled placeholder while Google Cloud Console is configured) */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 16px;
      color: var(--bone3);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .oauth-row { display: flex; flex-direction: column; gap: 10px; }
    .btn-oauth {
      background: var(--bg);
      color: var(--bone2);
      border: 1px dashed var(--border2);
      cursor: not-allowed;
      opacity: 0.6;
      position: relative;
    }
    .btn-oauth svg { width: 18px; height: 18px; flex-shrink: 0; }
    .btn-oauth .soon {
      position: absolute;
      right: 12px;
      font-size: 9.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--amber);
      background: rgba(255,170,23,0.12);
      border: 1px solid rgba(255,170,23,0.25);
      padding: 2px 7px;
      border-radius: 999px;
    }

    .msg {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      transition: color .2s;
    }
    .msg.error { color: var(--red); }
    .msg.ok    { color: var(--green); }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(26,18,6,0.35);
      border-top-color: #1a1206;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .foot {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--bone3);
    }
    .foot a { color: var(--bone2); text-decoration: none; }
    .foot a:hover { color: var(--amber); }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #FFFFFF; --surface: #F9FAFB; --surface2: #F1F3F5;
        --bone: #070809; --bone2: rgba(7,8,9,0.6); --bone3: rgba(7,8,9,0.38);
        --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14); --amber: #B87834;
      }
      .btn-primary { color: #fff; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="card">
    <div class="brand">
      <div class="door">🚪</div>
      <h1>VICTOR <b>IA</b> · Tracker</h1>
      <p>Cruza la puerta</p>
    </div>

    <!-- Selector: 2 opciones -->
    <div class="tabs" role="tablist">
      <button type="button" class="tab active" id="tabEmail" role="tab" aria-selected="true">Acceso con email</button>
      <button type="button" class="tab" id="tabQuick" role="tab" aria-selected="false">Acceso rápido</button>
    </div>

    <!-- Pane 1: Email / Password (Firebase) -->
    <div class="pane active" id="paneEmail" role="tabpanel">
      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="email">Correo</label>
          <input type="email" id="email" name="email" placeholder="tu@correo.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" id="btnEmail">Entrar</button>
        <div style="text-align: center; margin-top: 14px;">
          <button type="button" id="btnResetPassword" style="background: none; border: none; color: var(--bone2); cursor: pointer; font-size: 12px; text-decoration: underline; font-family: inherit;">¿Olvidaste tu contraseña?</button>
        </div>
      </form>

      <!-- OAuth -->
      <div class="divider">o continúa con</div>
      <div class="oauth-row">
        <button type="button" class="btn btn-oauth" id="btnGoogle" title="Acceso con Google">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
          Google
        </button>
        <button type="button" class="btn btn-oauth" id="btnApple" title="Acceso con Apple">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M17.05 13.5c-.91 0-1.82.58-2.75 1.52.93.94 1.84 1.52 2.75 1.52 1.86 0 3.37-1.51 3.37-3.37 0-1.86-1.51-3.37-3.37-3.37-1.86 0-3.37 1.51-3.37 3.37 0 .3.04.59.11.87.67-.28 1.52-.44 2.48-.44 3.42 0 6.18 2.76 6.18 6.18 0 3.42-2.76 6.18-6.18 6.18-1.7 0-3.24-.69-4.35-1.8-1.6 1.37-3.74 2.21-6.13 2.21-5.2 0-9.41-4.21-9.41-9.41S2.21 3.59 7.41 3.59c2.39 0 4.53.84 6.13 2.21 1.11-1.11 2.65-1.8 4.35-1.8 5.2 0 9.41 4.21 9.41 9.41 0 5.2-4.21 9.41-9.41 9.41-2.39 0-4.53-.84-6.13-2.21-1.6 1.37-3.74 2.21-6.13 2.21z"/></svg>
          Apple
        </button>
      </div>
    </div>

    <!-- Pane 2: Acceso rápido (sin Firebase, solo localStorage) -->
    <div class="pane" id="paneQuick" role="tabpanel">
      <p class="hint">Entra al panel sin servidor. Tu acceso se guarda solo en este dispositivo. Ideal mientras se termina de configurar el inicio de sesión completo.</p>
      <form id="quickForm" autocomplete="off">
        <div class="field">
          <label for="quickName">Tu nombre</label>
          <input type="text" id="quickName" name="quickName" placeholder="Pablo" required autocomplete="name">
        </div>
        <button type="submit" class="btn btn-primary" id="btnQuick">Entrar al panel</button>
      </form>
    </div>

    <div class="msg" id="msg"></div>

    <div class="foot">
      ¿No tienes cuenta? <a href="/signup.html">Regístrate</a>
    </div>
  </div>

  <script>
  (function(){
    "use strict";

    /* ===========================================================
       VICTOR IA Tracker — Login
       OAuth (Google/GitHub) está DESHABILITADO temporalmente:
       causa "redirect_uri_mismatch" hasta configurar Google Cloud
       Console. El código para re-habilitarlo está al final, comentado.
       Métodos activos: (1) Email/Password vía Firebase, (2) Acceso
       rápido vía localStorage (sin servidor).
       =========================================================== */

    /* ── Firebase config (victor-ia-tracker) — solo Email/Password ── */
    var cfg = {
      apiKey: "AIzaSyBciNfVGjH5l3szzGVgatXlZvLvaoNsp14",
      authDomain: "victor-ia-tracker.firebaseapp.com",
      projectId: "victor-ia-tracker",
      storageBucket: "victor-ia-tracker.firebasestorage.app",
      messagingSenderId: "475376340371",
      appId: "1:475376340371:web:caaf70c5c4063edfcb6c66"
    };

    var auth = null;
    try {
      if (window.firebase && firebase.auth) {
        if (!firebase.apps.length) firebase.initializeApp(cfg);
        auth = firebase.auth();
        try { auth.useDeviceLanguage(); } catch(e){}
      }
    } catch(e){ console.warn('Firebase init falló — Email/Password no disponible, usa Acceso rápido.', e); }

    /* ── DOM refs ── */
    var tabEmail  = document.getElementById('tabEmail');
    var tabQuick  = document.getElementById('tabQuick');
    var paneEmail = document.getElementById('paneEmail');
    var paneQuick = document.getElementById('paneQuick');

    var form      = document.getElementById('loginForm');
    var emailEl   = document.getElementById('email');
    var passEl    = document.getElementById('password');
    var btnEmail  = document.getElementById('btnEmail');
    var btnReset  = document.getElementById('btnResetPassword');

    var quickForm = document.getElementById('quickForm');
    var quickName = document.getElementById('quickName');
    var btnQuick  = document.getElementById('btnQuick');

    var btnGoogle = document.getElementById('btnGoogle');
    var btnApple  = document.getElementById('btnApple');

    var msgEl     = document.getElementById('msg');

    /* ── Helpers ── */
    function setMsg(text, type){
      msgEl.textContent = text || '';
      msgEl.className = 'msg' + (type ? ' ' + type : '');
    }
    function loadingBtn(btn, on, label){
      if (on){
        btn.dataset.label = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>' + (label || '');
      } else {
        btn.disabled = false;
        if (btn.dataset.label) btn.innerHTML = btn.dataset.label;
      }
    }

    /* ── Tabs ── */
    function selectTab(which){
      var isEmail = which === 'email';
      tabEmail.classList.toggle('active', isEmail);
      tabQuick.classList.toggle('active', !isEmail);
      tabEmail.setAttribute('aria-selected', isEmail ? 'true' : 'false');
      tabQuick.setAttribute('aria-selected', isEmail ? 'false' : 'true');
      paneEmail.classList.toggle('active', isEmail);
      paneQuick.classList.toggle('active', !isEmail);
      setMsg('');
    }
    tabEmail.addEventListener('click', function(){ selectTab('email'); });
    tabQuick.addEventListener('click', function(){ selectTab('quick'); });

    /* ── Persistir sesión (formato que index.html espera) y redirigir ── */
    function persistAndGo(data){
      try {
        localStorage.setItem('via_access_uid',   data.uid || ('local-' + Date.now()));
        localStorage.setItem('via_access_email', data.email || '');
        localStorage.setItem('via_access_name',  data.name || (data.email ? data.email.split('@')[0] : 'Usuario'));
        localStorage.setItem('via_access_photo', data.photo || '');
        localStorage.setItem('via_access_method', data.method || 'email');
        if (!localStorage.getItem('via_access_role')) localStorage.setItem('via_access_role', 'viewer');
        localStorage.setItem('via_access_authenticated', 'true');
      } catch(e){ console.warn('localStorage error', e); }
      setMsg('Acceso concedido. Entrando…', 'ok');
      setTimeout(function(){ window.location.href = '/index.html'; }, 450);
    }

    /* ── Mapeo de errores Firebase a español ── */
    function esError(err){
      var code = (err && err.code) || '';
      var map = {
        'auth/invalid-email': 'El correo no es válido.',
        'auth/user-disabled': 'Esta cuenta está deshabilitada.',
        'auth/user-not-found': 'No existe una cuenta con ese correo.',
        'auth/wrong-password': 'Correo o contraseña incorrectos.',
        'auth/invalid-credential': 'Correo o contraseña incorrectos.',
        'auth/invalid-login-credentials': 'Correo o contraseña incorrectos.',
        'auth/missing-password': 'Escribe tu contraseña.',
        'auth/too-many-requests': 'Demasiados intentos. Espera un momento e inténtalo de nuevo.',
        'auth/network-request-failed': 'Error de red. Revisa tu conexión.',
        'auth/unauthorized-domain': 'Este dominio no está autorizado en Firebase. Avisa al administrador.',
        'auth/operation-not-allowed': 'Este método de acceso no está habilitado. Avisa al administrador.'
      };
      return map[code] || ('No se pudo iniciar sesión. (' + (code || 'error desconocido') + ')');
    }

    /* ── Email / Password (Firebase) ── */
    form.addEventListener('submit', function(e){
      e.preventDefault();
      setMsg('');
      var email = emailEl.value.trim();
      var pass  = passEl.value;
      if (!email || !pass){ setMsg('Escribe tu correo y contraseña.', 'error'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ setMsg('El correo no es válido.', 'error'); return; }
      if (pass.length < 6){ setMsg('La contraseña debe tener al menos 6 caracteres.', 'error'); return; }

      if (!auth){
        setMsg('El acceso con email no está disponible ahora. Usa "Acceso rápido".', 'error');
        return;
      }

      loadingBtn(btnEmail, true, 'Entrando…');
      auth.signInWithEmailAndPassword(email, pass)
        .then(function(cred){
          var u = cred.user;
          persistAndGo({
            uid: u.uid,
            email: u.email || email,
            name: u.displayName || (u.email ? u.email.split('@')[0] : ''),
            photo: u.photoURL || '',
            method: 'email'
          });
        })
        .catch(function(err){
          console.warn('email login error', err);
          setMsg(esError(err), 'error');
          loadingBtn(btnEmail, false);
        });
    });

    /* ── Acceso rápido (sin Firebase, solo localStorage) ── */
    quickForm.addEventListener('submit', function(e){
      e.preventDefault();
      setMsg('');
      var name = quickName.value.trim();
      if (!name){ setMsg('Escribe tu nombre para entrar.', 'error'); return; }
      loadingBtn(btnQuick, true, 'Entrando…');
      persistAndGo({
        uid: 'local-' + Date.now(),
        email: '',
        name: name,
        photo: '',
        method: 'quick'
      });
    });

    /* ── Recovery de contraseña ── */
    if (btnReset){
      btnReset.addEventListener('click', function(e){
        e.preventDefault();
        var email = emailEl.value.trim();
        if (!email){
          setMsg('Escribe tu correo para recibir instrucciones de recuperación.', 'error');
          return;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
          setMsg('El correo no es válido.', 'error');
          return;
        }
        if (!auth){
          setMsg('El servicio de recuperación no está disponible. Intenta más tarde.', 'error');
          return;
        }
        loadingBtn(btnEmail, true, 'Enviando...');
        auth.sendPasswordResetEmail(email)
          .then(function(){
            setMsg('✓ Revisa tu correo para instrucciones de recuperación.', 'ok');
            loadingBtn(btnEmail, false);
          })
          .catch(function(err){
            setMsg(esError(err), 'error');
            loadingBtn(btnEmail, false);
          });
      });
    }

    /* ── OAuth helpers ── */
    function oauth(provider, btn){
      setMsg('');
      loadingBtn(btn, true, 'Conectando…');
      auth.signInWithPopup(provider)
        .then(function(result){
          var u = result.user;
          persistAndGo({ uid:u.uid, email:u.email||'', name:u.displayName||'', photo:u.photoURL||'', method:'oauth' });
        })
        .catch(function(err){
          if (err && err.code === 'auth/popup-blocked'){
            auth.signInWithRedirect(provider).catch(function(err2){
              setMsg(esError(err2), 'error');
              loadingBtn(btn, false);
            });
            return;
          }
          setMsg(esError(err), 'error');
          loadingBtn(btn, false);
        });
    }

    /* ── Google OAuth ── */
    if (btnGoogle && auth){
      btnGoogle.addEventListener('click', function(){
        try {
          var p = new firebase.auth.GoogleAuthProvider();
          p.setCustomParameters({ prompt: 'select_account' });
          oauth(p, btnGoogle);
        } catch(e){
          setMsg('Google no está disponible. Intenta con otro método.', 'error');
        }
      });
    }

    /* ── Apple OAuth ── */
    if (btnApple && auth){
      btnApple.addEventListener('click', function(){
        try {
          var p = new firebase.auth.OAuthProvider('apple.com');
          p.addScope('email');
          p.addScope('name');
          oauth(p, btnApple);
        } catch(e){
          setMsg('Apple no está disponible. Intenta con otro método.', 'error');
        }
      });
    }

    /* ── Manejar redirect result si viene de Apple/Google ── */
    if (auth){
      auth.getRedirectResult().then(function(result){
        if (result && result.user){
          var u = result.user;
          persistAndGo({ uid:u.uid, email:u.email||'', name:u.displayName||'', photo:u.photoURL||'', method:'oauth' });
        }
      }).catch(function(err){
        if (err && err.code && err.code !== 'auth/no-auth-event'){
          setMsg(esError(err), 'error');
        }
      });
    }

    /* ── Si ya hay sesión Firebase activa, saltar el formulario ── */
    if (auth){
      try {
        auth.onAuthStateChanged(function(user){
          if (user && localStorage.getItem('via_access_authenticated') !== 'true'){
            persistAndGo({
              uid: user.uid,
              email: user.email || '',
              name: user.displayName || (user.email ? user.email.split('@')[0] : ''),
              photo: user.photoURL || '',
              method: 'email'
            });
          }
        });
      } catch(e){}
    }

    /* ===========================================================
       RE-HABILITAR GOOGLE / GITHUB OAUTH (producción)
       Una vez configurado Google Cloud Console (OAuth consent +
       Authorized redirect URIs que incluyan:
         https://victor-ia-tracker.firebaseapp.com/__/auth/handler
       y tu dominio del tracker), haz lo siguiente:

       1) En el HTML, quita los atributos  disabled  aria-disabled
          y el <span class="soon">…</span> de #btnGoogle y #btnGithub.
          Cambia la clase  btn-oauth  a un estilo activo si quieres.
          Cambia el texto del divider "próximamente" por "o continúa con".

       2) Descomenta el bloque de abajo:

       function oauth(provider, btn){
         setMsg('');
         loadingBtn(btn, true, 'Conectando…');
         auth.signInWithPopup(provider)
           .then(function(result){
             var u = result.user;
             persistAndGo({ uid:u.uid, email:u.email||'', name:u.displayName||'', photo:u.photoURL||'', method:'oauth' });
           })
           .catch(function(err){
             if (err && err.code === 'auth/popup-blocked'){
               auth.signInWithRedirect(provider).catch(function(err2){
                 setMsg(esError(err2), 'error'); loadingBtn(btn, false);
               });
               return;
             }
             setMsg(esError(err), 'error'); loadingBtn(btn, false);
           });
       }
       document.getElementById('btnGoogle').addEventListener('click', function(){
         var p = new firebase.auth.GoogleAuthProvider();
         p.setCustomParameters({ prompt: 'select_account' });
         oauth(p, this);
       });
       document.getElementById('btnGithub').addEventListener('click', function(){
         var p = new firebase.auth.GithubAuthProvider();
         p.addScope('read:user'); p.addScope('user:email');
         oauth(p, this);
       });
       // Y maneja el retorno por redirect:
       auth.getRedirectResult().then(function(result){
         if (result && result.user){
           var u = result.user;
           persistAndGo({ uid:u.uid, email:u.email||'', name:u.displayName||'', photo:u.photoURL||'', method:'oauth' });
         }
       }).catch(function(err){
         if (err && err.code && err.code !== 'auth/no-auth-event'){ setMsg(esError(err), 'error'); }
       });
       =========================================================== */
  })();
  </script>
