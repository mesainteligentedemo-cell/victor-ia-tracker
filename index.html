<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Victor IA — Performance Tracker v3</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0E12;--surface:#111820;--surface2:#161e28;--bone:rgba(245,241,232,0.92);
  --bone2:rgba(245,241,232,0.55);--bone3:rgba(245,241,232,0.15);
  --amber:#FFAA17;--amber2:rgba(255,170,23,0.15);--amber3:rgba(255,170,23,0.08);
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --border:rgba(245,241,232,0.08);--radius:10px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--bone);min-height:100vh;font-size:14px}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:14px;outline:none}

/* TOPBAR */
#topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:54px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-wrap:wrap}
#topbar h1{font-size:15px;font-weight:700;letter-spacing:.5px;color:var(--amber);white-space:nowrap}
#topbar .badge{background:var(--amber2);border:1px solid var(--amber);color:var(--amber);font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
#topbar .spacer{flex:1}
#topbar .topbar-btns{display:flex;gap:8px;flex-wrap:wrap}
#topbar .topbar-btns button{background:var(--surface2);border:1px solid var(--border);color:var(--bone2);padding:6px 14px;border-radius:6px;font-size:12px;transition:all .2s}
#topbar .topbar-btns button:hover{border-color:var(--amber);color:var(--amber)}

/* PERIOD SELECTOR */
#period-bar{display:flex;align-items:center;gap:8px;padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:54px;z-index:99;flex-wrap:wrap}
#period-bar .period-label{font-size:11px;color:var(--bone2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
.period-btn{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;background:transparent;border:1px solid var(--border);color:var(--bone2);transition:all .2s}
.period-btn:hover{border-color:var(--amber);color:var(--amber)}
.period-btn.active{background:var(--amber2);border-color:var(--amber);color:var(--amber)}
#period-custom{display:none;gap:8px;align-items:center}
#period-custom.show{display:flex}
#period-custom input{background:var(--surface2);border:1px solid var(--border);color:var(--bone);padding:4px 8px;border-radius:6px;font-size:11px}
#period-custom button{background:var(--amber);color:#000;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700}
#period-summary{font-size:11px;color:var(--bone2);margin-left:auto}

/* TABS */
#tabs{display:flex;gap:2px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:102px;z-index:98}
.tab-btn{padding:10px 18px;font-size:13px;font-weight:600;color:var(--bone2);background:transparent;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:var(--bone)}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber)}

/* LAYOUT */
#main{display:flex;min-height:calc(100vh - 152px)}
#sidebar{width:280px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);padding:16px;overflow-y:auto;max-height:calc(100vh - 152px);position:sticky;top:152px}
#sidebar.hidden{display:none}
#content{flex:1;padding:20px;overflow-y:auto;max-height:calc(100vh - 152px)}

/* SIDEBAR */
.sidebar-title{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--amber);text-transform:uppercase;margin-bottom:10px}
.filter-group{margin-bottom:14px}
.filter-group label{display:block;font-size:11px;color:var(--bone2);margin-bottom:4px;font-weight:600}
.filter-group input,.filter-group select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--bone);padding:6px 10px;border-radius:6px;font-size:12px}
.filter-group input:focus,.filter-group select:focus{border-color:var(--amber)}
.filter-group input[type=range]{padding:0;height:24px}
.range-val{font-size:11px;color:var(--amber);text-align:center;margin-top:2px}
.filter-actions{display:flex;gap:6px;margin-top:4px}
.filter-actions button{flex:1;padding:6px;border-radius:6px;font-size:11px;font-weight:700}
.btn-apply{background:var(--amber);color:#000}
.btn-clear{background:var(--surface2);border:1px solid var(--border);color:var(--bone2)}

/* CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden}
.kpi-card.hero{border-color:rgba(255,170,23,0.3)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--amber);opacity:0}
.kpi-card.hero::before{opacity:1}
.kpi-label{font-size:10px;color:var(--bone2);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:800;color:var(--amber);line-height:1}
.kpi-sub{font-size:11px;color:var(--bone2);margin-top:4px}
.kpi-trend{position:absolute;top:14px;right:14px;font-size:18px}

/* SECTION HEADERS */
.section-title{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--amber);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* CHARTS */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:20px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.chart-card h3{font-size:12px;color:var(--bone2);font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.chart-wrap{position:relative;height:200px}
.chart-wrap canvas{max-height:200px}

/* BARS */
.bar-list{display:flex;flex-direction:column;gap:8px}
.bar-item{display:flex;align-items:center;gap:10px}
.bar-label{min-width:110px;font-size:12px;color:var(--bone2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:6px;background:var(--bone3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--amber);border-radius:3px;transition:width .4s}
.bar-val{min-width:50px;text-align:right;font-size:12px;color:var(--bone);font-weight:600}

/* TABLE */
.table-wrap{overflow-x:auto;margin-bottom:20px}
table{width:100%;border-collapse:collapse}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--bone2);text-transform:uppercase;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap}
th:hover{color:var(--amber)}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
tr:hover td{background:var(--amber3)}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;margin:1px}
.tag-dev{background:rgba(59,130,246,.2);color:#93c5fd}
.tag-mkt{background:rgba(168,85,247,.2);color:#d8b4fe}
.tag-des{background:rgba(34,197,94,.2);color:#86efac}
.tag-ai{background:rgba(255,170,23,.2);color:var(--amber)}
.tag-ops{background:rgba(239,68,68,.2);color:#fca5a5}
.tag-vid{background:rgba(20,184,166,.2);color:#5eead4}
.badge-status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.s-done{background:rgba(34,197,94,.15);color:var(--green)}
.s-prog{background:rgba(59,130,246,.15);color:var(--blue)}
.s-rev{background:rgba(239,68,68,.15);color:var(--red)}
.pagination{display:flex;align-items:center;gap:8px;justify-content:flex-end;padding:8px 0;flex-wrap:wrap}
.pagination button{background:var(--surface2);border:1px solid var(--border);color:var(--bone2);padding:4px 10px;border-radius:6px;font-size:12px}
.pagination button:hover:not(:disabled){border-color:var(--amber);color:var(--amber)}
.pagination button:disabled{opacity:.35}
.pagination span{font-size:12px;color:var(--bone2)}
.sort-icon{font-size:10px;margin-left:3px}

/* HEATMAP */
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.hm-cell{height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--bone2)}
.hm-0{background:var(--bone3)}
.hm-1{background:rgba(255,170,23,.25)}
.hm-2{background:rgba(255,170,23,.45)}
.hm-3{background:rgba(255,170,23,.65)}
.hm-4{background:rgba(255,170,23,.85)}
.hm-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.hm-day{text-align:center;font-size:9px;color:var(--bone2)}

/* SOFTWARE TABLE */
.sw-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.sw-table th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--amber);text-transform:uppercase;border-bottom:1px solid var(--border)}
.sw-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
.sw-table tr:hover td{background:var(--amber3)}
.sw-type{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.type-api{background:rgba(59,130,246,.2);color:#93c5fd}
.type-saas{background:rgba(34,197,94,.2);color:#86efac}
.type-free{background:rgba(245,241,232,.1);color:var(--bone2)}
.cost-bar-mini{height:4px;background:var(--bone3);border-radius:2px;margin-top:4px;overflow:hidden}
.cost-bar-fill{height:100%;background:var(--amber);border-radius:2px}

/* DASHBOARD */
.today-bar{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.today-bar .tstat{display:flex;flex-direction:column;min-width:80px}
.today-bar .tstat .tv{font-size:22px;font-weight:800;color:var(--amber);line-height:1}
.today-bar .tstat .tl{font-size:10px;color:var(--bone2);font-weight:700;text-transform:uppercase}
.today-divider{width:1px;height:36px;background:var(--border)}

/* FEED */
.feed-list{display:flex;flex-direction:column;gap:0}
.feed-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.feed-dot{width:8px;height:8px;border-radius:50%;background:var(--amber);margin-top:5px;flex-shrink:0}
.feed-dot.rework{background:var(--red)}
.feed-time{font-size:11px;color:var(--bone2);white-space:nowrap;min-width:42px}
.feed-body{flex:1}
.feed-desc{font-size:13px;color:var(--bone);margin-bottom:2px}
.feed-obs{font-size:11px;color:var(--amber);font-style:italic;margin-top:2px}
.feed-meta{font-size:10px;color:var(--bone2);margin-top:2px}
.feed-cost{font-size:11px;color:var(--green);font-weight:700;margin-top:2px}
.feed-pricing-row{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.feed-price-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.feed-price-tag.cost{color:#f97316;background:rgba(249,115,22,.1)}
.feed-price-tag.price{color:#22c55e;background:rgba(34,197,94,.1)}
.feed-price-tag.margin{color:#FFAA17;background:rgba(255,170,23,.1)}
.feed-price-tag em{font-style:normal;opacity:.7}
.feed-price-sep{color:rgba(245,241,232,.2);font-size:12px}
/* CLIENT MODE — hides internal cost data */
body.client-mode .internal-only{display:none!important}
body.client-mode #client-mode-btn{background:var(--amber);color:#000;font-weight:800}
.client-mode-banner{display:none;background:rgba(255,170,23,.15);border:1px solid var(--amber);color:var(--amber);font-size:11px;font-weight:700;text-align:center;padding:6px;letter-spacing:.5px}
body.client-mode .client-mode-banner{display:block}
.feed-sw{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.feed-sw-tag{background:var(--amber3);border:1px solid rgba(255,170,23,.2);color:var(--amber);font-size:10px;padding:1px 6px;border-radius:8px}

/* PROMPT ENGINEERING */
.prompt-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:800;margin-top:3px}
.prompt-1{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.prompt-2{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.prompt-3{background:rgba(255,170,23,.15);color:var(--amber);border:1px solid rgba(255,170,23,.3)}
.prompt-high{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.prompt-winner{font-size:10px;color:var(--blue);font-style:italic;margin-top:3px;padding:4px 8px;background:rgba(59,130,246,.06);border-left:2px solid var(--blue);border-radius:0 4px 4px 0}
.prompt-section{margin-top:16px;padding:14px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:var(--radius)}
.prompt-section h4{font-size:11px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.peff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:12px}
.peff-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.peff-val{font-size:22px;font-weight:800;line-height:1;margin-bottom:2px}
.peff-label{font-size:9px;color:var(--bone2);font-weight:700;text-transform:uppercase;letter-spacing:.3px}

/* FLOWCHART HTML */
.fl-outer{background:var(--surface2);border-radius:var(--radius);padding:20px}
.fl-heading{font-size:12px;font-weight:800;letter-spacing:.5px;color:var(--bone);text-transform:uppercase;margin-bottom:16px}
.fl-section-title{font-size:9px;color:var(--bone2);letter-spacing:.3px;text-transform:uppercase;font-weight:700;margin-bottom:8px;padding-left:2px}
.fl-pipe-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fl-card{background:color-mix(in srgb,var(--fc,#FFAA17) 12%,transparent);border:1.5px solid var(--fc,#FFAA17);border-radius:10px;padding:10px 14px;cursor:pointer;text-align:left;min-width:100px;transition:all .2s;color:inherit;font-family:inherit;flex-shrink:0}
.fl-card:hover{background:color-mix(in srgb,var(--fc,#FFAA17) 26%,transparent);transform:translateY(-2px);box-shadow:0 4px 18px rgba(0,0,0,.35)}
.fl-card-title{font-size:11px;font-weight:700;color:var(--fc,#FFAA17);line-height:1.3}
.fl-card-sub{font-size:10px;color:var(--bone2);margin-top:3px}
.fl-pipe-arrow{color:rgba(245,241,232,.3);font-size:20px;flex-shrink:0;line-height:1;user-select:none}
.fl-divider{display:flex;gap:8px;flex-wrap:wrap;padding:10px 0;border-top:1px dashed rgba(245,241,232,.1);border-bottom:1px dashed rgba(245,241,232,.1);margin:14px 0}
.fl-divider-badge{font-size:10px;color:var(--bone2);background:rgba(245,241,232,.05);border-radius:4px;padding:3px 8px}
.fl-feedback-row{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
.fl-fb-group{flex:1;min-width:200px}
.fl-fb-label{font-size:10px;color:var(--bone2);margin-bottom:8px;font-weight:600}
.fl-fb-sublabel{font-size:10px;color:rgba(245,241,232,.35);margin-top:6px;font-style:italic}
.fl-footer{font-size:10px;color:rgba(245,241,232,.3);margin-top:14px;text-align:center;letter-spacing:.3px}
/* REPORTES TAB */
.rep-dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:8px}
.rep-dept-card{background:var(--surface2);border:1px solid rgba(245,241,232,.08);border-radius:10px;padding:14px;border-top:2px solid var(--dc,#FFAA17)}
.rep-dept-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rep-dept-name{font-size:12px;font-weight:800;letter-spacing:.2px}
.rep-dept-pct{font-size:11px;font-weight:700;color:var(--bone2)}
.rep-dept-bar{height:4px;background:rgba(245,241,232,.08);border-radius:2px;margin-bottom:10px;overflow:hidden}
.rep-dept-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.rep-dept-stats{display:flex;gap:12px;font-size:10px;color:var(--bone2);margin-bottom:10px;font-weight:600}
.rep-dept-actions{display:flex;flex-direction:column;gap:4px}
.rep-dept-action{display:grid;grid-template-columns:72px 1fr auto;gap:6px;align-items:center;font-size:10px;padding:4px 0;border-top:1px solid rgba(245,241,232,.05)}
.rep-da-date{color:rgba(245,241,232,.4);font-family:monospace;font-size:9px}
.rep-da-desc{color:var(--bone2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rep-da-dur{color:var(--amber);font-weight:700;white-space:nowrap}
.rep-dept-more{font-size:10px;color:rgba(245,241,232,.3);text-align:center;padding-top:4px}
/* Daily reports */
.rep-daily{display:flex;flex-direction:column;gap:16px}
.rep-day-card{background:var(--surface2);border:1px solid rgba(245,241,232,.08);border-radius:10px;overflow:hidden}
.rep-day-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(245,241,232,.04);flex-wrap:wrap;gap:8px}
.rep-day-date{display:flex;flex-direction:column;gap:2px}
.rep-day-label{font-size:13px;font-weight:800;color:var(--bone);text-transform:capitalize}
.rep-day-key{font-size:10px;color:var(--bone2);font-family:monospace}
.rep-day-totals{display:flex;gap:12px;flex-wrap:wrap}
.rep-day-stat{font-size:11px;font-weight:700;color:var(--amber);background:rgba(255,170,23,.1);padding:3px 8px;border-radius:4px}
.rep-day-timeline{padding:0 16px 12px}
.rep-timeline-row{display:grid;grid-template-columns:44px 10px 1fr;gap:8px;align-items:start;padding:10px 0;border-bottom:1px solid rgba(245,241,232,.05)}
.rep-timeline-row:last-child{border-bottom:none}
.rep-tl-time{font-size:11px;font-family:monospace;color:rgba(245,241,232,.5);padding-top:2px;text-align:right}
.rep-tl-dot{width:10px;height:10px;border-radius:50%;margin-top:3px;flex-shrink:0}
.rep-tl-body{flex:1;min-width:0}
.rep-tl-desc{font-size:12px;font-weight:600;color:var(--bone);line-height:1.4;margin-bottom:4px}
.rep-tl-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.rep-tl-cat{font-size:10px;font-weight:700}
.rep-tl-proj{font-size:10px;color:rgba(245,241,232,.4)}
.rep-tl-dur{font-size:10px;font-weight:700;color:var(--amber)}
.rep-tl-cost{font-size:10px;color:var(--green)}
.rep-tl-status{font-size:10px;font-weight:600}
.rep-tl-rework{font-size:10px;color:#ef4444;font-weight:700}
.rep-tl-obs{font-size:10px;color:rgba(245,241,232,.45);margin-top:4px;font-style:italic}
/* Project phase breakdown in Reportes */
.rep-project-card{background:var(--surface2);border:1px solid rgba(245,241,232,.08);border-radius:10px;padding:14px}
.rep-project-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.rep-project-name{font-size:13px;font-weight:800;color:var(--bone)}
.rep-project-stats{display:flex;gap:8px;flex-wrap:wrap;font-size:10px;font-weight:700}
.rep-phase-list{display:flex;flex-direction:column;gap:5px}
.rep-phase-row{display:grid;grid-template-columns:90px 1fr 44px 72px 72px;gap:8px;align-items:center;font-size:10px}
.rep-phase-name{font-weight:700;font-size:10px}
.rep-phase-bar-wrap{background:rgba(245,241,232,.06);border-radius:2px;height:4px;overflow:hidden}
.rep-phase-bar{height:100%;border-radius:2px;transition:width .3s}
.rep-phase-h{color:var(--amber);font-weight:700;text-align:right}
.rep-phase-cost{color:#f97316;text-align:right}
.rep-phase-price{color:#22c55e;text-align:right}
/* Flow modal */
.fl-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;align-items:center;justify-content:center;padding:20px}
.fl-modal-box{background:var(--surface);border:1px solid var(--amber);border-radius:12px;padding:24px;min-width:280px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto}
.fl-modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px}
.fl-modal-title-text{font-size:14px;font-weight:800;color:var(--amber)}
.fl-modal-close{background:none;border:1px solid rgba(245,241,232,.3);color:var(--bone);border-radius:4px;padding:2px 10px;cursor:pointer;font-size:13px}
.fl-modal-close:hover{background:rgba(245,241,232,.1)}
.fl-modal-row{display:flex;justify-content:space-between;gap:16px;padding:9px 0;border-bottom:1px solid rgba(245,241,232,.07);flex-wrap:wrap}
.fl-modal-key{font-size:11px;color:var(--bone2);flex-shrink:0}
.fl-modal-val{font-size:11px;color:var(--bone);font-weight:700;text-align:right;flex:1}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:24px}
.modal h2{font-size:16px;font-weight:800;color:var(--amber);margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.form-group label{display:block;font-size:11px;color:var(--bone2);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--bone);padding:8px 12px;border-radius:6px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--amber)}
.form-group textarea{resize:vertical;min-height:70px}
.sw-checkboxes{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-height:180px;overflow-y:auto;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px}
.sw-cb-item{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px;border-radius:4px}
.sw-cb-item:hover{background:var(--amber3)}
.sw-cb-item input[type=checkbox]{accent-color:var(--amber);width:14px;height:14px;flex-shrink:0}
.sw-cb-item label{font-size:11px;color:var(--bone);cursor:pointer}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn-save{background:var(--amber);color:#000;padding:8px 24px;border-radius:6px;font-weight:800;font-size:13px}
.btn-cancel{background:var(--surface2);border:1px solid var(--border);color:var(--bone2);padding:8px 20px;border-radius:6px;font-size:13px}

/* DUR INPUT ROW */
.dur-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.dur-row input{text-align:center}
.dur-hint{font-size:10px;color:var(--bone2);text-align:center;margin-top:2px}

/* CHATBOT */
#chatbot-btn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--amber);color:#000;font-size:22px;display:flex;align-items:center;justify-content:center;z-index:900;box-shadow:0 4px 20px rgba(255,170,23,.4);transition:transform .2s}
#chatbot-btn:hover{transform:scale(1.1)}
#chatbot-panel{position:fixed;bottom:86px;right:24px;width:360px;max-height:500px;background:var(--surface);border:1px solid var(--border);border-radius:12px;z-index:900;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.6)}
#chatbot-panel.hidden{display:none}
#chat-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#chat-header h3{font-size:13px;font-weight:700;color:var(--amber)}
#chat-close{background:transparent;color:var(--bone2);font-size:18px}
#chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;max-height:320px}
.chat-msg{padding:8px 12px;border-radius:8px;font-size:12px;max-width:85%;line-height:1.5}
.chat-msg.user{background:var(--amber2);color:var(--bone);align-self:flex-end;margin-left:auto}
.chat-msg.bot{background:var(--surface2);color:var(--bone);align-self:flex-start}
.chat-msg.system{background:transparent;color:var(--bone2);font-style:italic;font-size:11px;text-align:center;align-self:center}
#chat-quick{display:flex;flex-wrap:wrap;gap:4px;padding:8px 12px;border-top:1px solid var(--border)}
#chat-quick button{background:var(--amber3);border:1px solid rgba(255,170,23,.2);color:var(--amber);padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;cursor:pointer}
#chat-input-row{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--border)}
#chat-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--bone);padding:7px 10px;border-radius:6px;font-size:12px}
#chat-input:focus{border-color:var(--amber)}
#chat-send{background:var(--amber);color:#000;padding:7px 12px;border-radius:6px;font-weight:700;font-size:12px}

/* SUMMARY PANEL */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.summary-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.summary-panel h3{font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.top-item{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)}
.top-item:last-child{border:none}
.top-name{font-size:12px;color:var(--bone)}
.top-val{font-size:12px;color:var(--amber);font-weight:700}

/* EXPORT */
.export-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.export-row button{background:var(--surface);border:1px solid var(--border);color:var(--bone2);padding:6px 14px;border-radius:6px;font-size:12px}
.export-row button:hover{border-color:var(--amber);color:var(--amber)}

/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{display:none}
  #topbar{height:auto;padding:10px 12px;gap:8px}
  #topbar h1{font-size:13px}
  #topbar .topbar-btns{gap:6px}
  #topbar .topbar-btns button{padding:5px 10px;font-size:11px}
  #period-bar{padding:6px 12px;gap:6px;top:auto;position:relative}
  .period-btn{padding:4px 10px;font-size:10px}
  #period-summary{display:none}
  #tabs{top:0;position:relative;padding:0 8px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .tab-btn{padding:8px 12px;font-size:11px;white-space:nowrap}
  #main{flex-direction:column}
  #content{padding:12px;max-height:none}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi-card{padding:10px}
  .kpi-val{font-size:20px}
  .chart-grid{grid-template-columns:1fr}
  .summary-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  #chatbot-panel{width:calc(100vw - 24px);right:12px;bottom:76px}
  #chatbot-btn{width:46px;height:46px;bottom:16px;right:16px;font-size:18px}
  .sw-checkboxes{grid-template-columns:repeat(2,1fr)}
  .dur-row{grid-template-columns:1fr 1fr}
  .today-bar{gap:10px}
  .today-bar .tstat .tv{font-size:18px}
  .today-divider{display:none}
  .modal{padding:16px}
  .modal-overlay{padding:10px}
  .chart-card{padding:12px}
  .sw-table{font-size:11px}
  .sw-table th,.sw-table td{padding:6px 8px}
  table{font-size:11px}
  th,td{padding:6px 6px}
  /* Hide less important columns on mobile */
  .hide-mobile{display:none}
  .bar-label{min-width:80px;font-size:11px}
  /* Finanzas y Organigrama responsive */
  #view-finanzas [style*="grid-template-columns:1fr 1fr"],
  #view-organigrama [style*="grid-template-columns:1fr 1fr"],
  #view-organigrama [style*="grid-template-columns:repeat(3,1fr)"]{
    display:block!important
  }
  #view-finanzas > div[style*="grid-template-columns"],
  #view-organigrama > div[style*="grid-template-columns"]{
    display:flex!important;flex-direction:column!important
  }
  .heatmap-grid{grid-template-columns:repeat(7,1fr);gap:2px}
  .hm-cell{height:22px;font-size:8px}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  #topbar .topbar-btns button:not(:first-child):not(:last-child){display:none}
  .period-btn{padding:3px 8px;font-size:10px}
}
@media(min-width:769px) and (max-width:1024px){
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  #sidebar{width:240px;min-width:240px}
  .chart-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <h1>⚡ Victor IA Tracker</h1>
  <span class="badge">v3</span>
  <div class="spacer"></div>
  <div class="topbar-btns">
    <button onclick="openAdd()">+ Entrada</button>
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="toggleSidebar()">⧉ Filtros</button>
    <button id="client-mode-btn" onclick="toggleClientMode()" title="Modo cliente: oculta costos internos, solo muestra precio público">👁 Modo Cliente</button>
    <button onclick="showSettings()">⚙ Config</button>
  </div>
</div>

<div class="client-mode-banner">👁 MODO CLIENTE ACTIVO — Solo se muestran precios de venta (costos internos ocultos)</div>

<!-- PERIOD BAR -->
<div id="period-bar">
  <span class="period-label">Período:</span>
  <button class="period-btn" onclick="setPeriod('hour')">Esta hora</button>
  <button class="period-btn active" onclick="setPeriod('today')">Hoy</button>
  <button class="period-btn" onclick="setPeriod('week')">Esta semana</button>
  <button class="period-btn" onclick="setPeriod('month')">Este mes</button>
  <button class="period-btn" onclick="setPeriod('year')">Este año</button>
  <button class="period-btn" onclick="setPeriod('all')">Todo</button>
  <button class="period-btn" onclick="setPeriod('custom')">Rango custom</button>
  <div id="period-custom">
    <input type="date" id="period-from">
    <span style="color:var(--bone2);font-size:11px">→</span>
    <input type="date" id="period-to">
    <button onclick="applyCustomPeriod()">Aplicar</button>
  </div>
  <span id="period-summary"></span>
</div>

<!-- TABS -->
<div id="tabs">
  <button class="tab-btn active" onclick="setTab('dashboard')">📊 Dashboard</button>
  <button class="tab-btn" onclick="setTab('analytics')">📈 Analytics</button>
  <button class="tab-btn" onclick="setTab('finanzas')">💼 Finanzas</button>
  <button class="tab-btn" onclick="setTab('organigrama')">🏢 Organigrama</button>
  <button class="tab-btn" onclick="setTab('software')">🛠 Software & APIs</button>
  <button class="tab-btn" onclick="setTab('entradas')">📋 Entradas</button>
  <button class="tab-btn" onclick="setTab('reportes')">📑 Reportes</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="sidebar">
    <div class="sidebar-title">Filtros avanzados</div>
    <div class="filter-group">
      <label>Buscar texto</label>
      <input type="text" id="f-search" placeholder="Descripción, obs, notas...">
    </div>
    <div class="filter-group">
      <label>Categoría</label>
      <select id="f-cat">
        <option value="">Todas</option>
        <option>Desarrollo</option>
        <option>Marketing</option>
        <option>Diseño</option>
        <option>IA/Automatización</option>
        <option>Video</option>
        <option>Operaciones</option>
        <option>Ventas/CRM</option>
        <option>Reunión</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Proyecto</label>
      <select id="f-project"><option value="">Todos</option></select>
    </div>
    <div class="filter-group">
      <label>Cliente</label>
      <select id="f-client"><option value="">Todos</option></select>
    </div>
    <div class="filter-group">
      <label>Estado</label>
      <select id="f-status">
        <option value="">Todos</option>
        <option>Completado</option>
        <option>En progreso</option>
        <option>Revisión</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Prioridad</label>
      <select id="f-priority">
        <option value="">Todas</option>
        <option>Alta</option>
        <option>Media</option>
        <option>Baja</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Duración mínima: <span id="dur-min-val">0m</span></label>
      <input type="range" id="f-dur-min" min="0" max="480" step="5" value="0" oninput="document.getElementById('dur-min-val').textContent=minsToLabel(+this.value)">
    </div>
    <div class="filter-group">
      <label>Retrabajo</label>
      <select id="f-rework">
        <option value="">Todos</option>
        <option value="1">Sí</option>
        <option value="0">No</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Software usado</label>
      <select id="f-sw"><option value="">Cualquiera</option></select>
    </div>
    <div class="filter-actions">
      <button class="btn-apply" onclick="applyFilters()">Aplicar</button>
      <button class="btn-clear" onclick="clearFilters()">Limpiar</button>
    </div>
  </div>

  <div id="content">
    <div id="view-dashboard"></div>
    <div id="view-analytics" class="hidden"></div>
    <div id="view-finanzas" class="hidden"></div>
    <div id="view-organigrama" class="hidden"></div>
    <div id="view-software" class="hidden"></div>
    <div id="view-entradas" class="hidden"></div>
    <div id="view-reportes" class="hidden"></div>
  </div>
</div>

<!-- ENTRY MODAL -->
<div class="modal-overlay hidden" id="entry-modal">
  <div class="modal">
    <h2 id="modal-title">Nueva Entrada</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Descripción *</label>
        <input type="text" id="e-desc" placeholder="¿Qué se hizo?">
      </div>
      <div class="form-group full">
        <label>¿Por qué se hizo? (motivación / contexto)</label>
        <textarea id="e-why" rows="2" placeholder="Por qué era necesario hacerlo, qué lo disparó..."></textarea>
      </div>
      <div class="form-group full">
        <label>¿Para qué se hizo? (objetivo)</label>
        <textarea id="e-forwhat" rows="2" placeholder="Qué se buscaba lograr con esta acción..."></textarea>
      </div>
      <div class="form-group full">
        <label>¿Qué se logró? (resultado real)</label>
        <textarea id="e-result" rows="2" placeholder="Qué quedó hecho, qué se entregó, qué cambió..."></textarea>
      </div>
      <div class="form-group full">
        <label>Observaciones y mejoras posibles (lenguaje libre)</label>
        <textarea id="e-obs" rows="2" placeholder="Dificultades, contexto coloquial, qué mejoraría la próxima vez..."></textarea>
      </div>
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="e-date">
      </div>
      <div class="form-group">
        <label>Hora inicio</label>
        <input type="time" id="e-hora">
      </div>
      <div class="form-group full">
        <label>Duración</label>
        <div class="dur-row">
          <div>
            <input type="number" id="e-dur-h" min="0" max="23" value="1" placeholder="0">
            <div class="dur-hint">Horas</div>
          </div>
          <div>
            <input type="number" id="e-dur-m" min="0" max="59" value="0" placeholder="0">
            <div class="dur-hint">Minutos</div>
          </div>
          <div>
            <input type="number" id="e-dur-s" min="0" max="59" value="0" placeholder="0">
            <div class="dur-hint">Segundos</div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <select id="e-cat">
          <option>Desarrollo</option>
          <option>Marketing</option>
          <option>Diseño</option>
          <option>IA/Automatización</option>
          <option>Video</option>
          <option>Operaciones</option>
          <option>Ventas/CRM</option>
          <option>Reunión</option>
        </select>
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="e-status">
          <option>Completado</option>
          <option>En progreso</option>
          <option>Revisión</option>
        </select>
      </div>
      <div class="form-group">
        <label>Proyecto</label>
        <input type="text" id="e-project" list="projects-list" placeholder="Victor IA, Costa Negra...">
        <datalist id="projects-list"></datalist>
      </div>
      <div class="form-group">
        <label>Cliente</label>
        <input type="text" id="e-client" list="clients-list" placeholder="Victor IA, Costa Negra...">
        <datalist id="clients-list"></datalist>
      </div>
      <div class="form-group">
        <label>Fase del proyecto</label>
        <select id="e-phase">
          <option value="">— sin fase —</option>
          <option value="Ideación">💡 Ideación / Estrategia</option>
          <option value="Creativo">🎨 Diseño / Creativo</option>
          <option value="Ejecución">⚙️ Ejecución / Desarrollo</option>
          <option value="Revisión">🔍 Revisión / QA</option>
          <option value="Entrega">🚀 Entrega / Deploy</option>
        </select>
      </div>
      <div class="form-group">
        <label>Prioridad</label>
        <select id="e-priority">
          <option>Alta</option>
          <option>Media</option>
          <option>Baja</option>
        </select>
      </div>
      <div class="form-group">
        <label>¿Retrabajo?</label>
        <select id="e-rework">
          <option value="0">No</option>
          <option value="1">Sí</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Software / Herramientas usadas</label>
        <div class="sw-checkboxes" id="sw-checkboxes"></div>
      </div>
      <div class="form-group">
        <label>🎯 Prompts necesarios para resultado perfecto</label>
        <input type="number" id="e-prompt-count" min="1" max="200" value="1" placeholder="1">
      </div>
      <div class="form-group">
        <label>Categoría del prompt</label>
        <select id="e-prompt-cat">
          <option value="">— automático por categoría —</option>
          <option value="imagen">Imagen (Midjourney, Higgsfield...)</option>
          <option value="video">Video (LTX, Runway, Seedance...)</option>
          <option value="codigo">Código (Claude, GPT...)</option>
          <option value="copy">Copy / Texto</option>
          <option value="flujo">Flujo / Automatización (n8n...)</option>
          <option value="datos">Análisis de datos</option>
          <option value="diseno">Diseño (Figma, Canva...)</option>
          <option value="otro">Otro</option>
        </select>
      </div>
      <div class="form-group full">
        <label>✅ Prompt ganador / definitivo (el que funcionó)</label>
        <textarea id="e-prompt-winner" rows="3" placeholder="Escribe o pega aquí el prompt exacto que dio el mejor resultado. Esto alimenta el análisis de prompt engineering..."></textarea>
      </div>
      <div class="form-group full">
        <label>📝 Notas del proceso de prompting (qué mejoró, qué no funcionó)</label>
        <textarea id="e-prompt-notes" rows="2" placeholder="Qué cambios hiciste entre intentos, qué falló primero, qué técnica funcionó..."></textarea>
      </div>
      <div class="form-group full">
        <label>Notas técnicas</label>
        <textarea id="e-notes" rows="2" placeholder="Detalles técnicos, links, referencias..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('entry-modal')">Cancelar</button>
      <button class="btn-save" onclick="saveEntry()">Guardar</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay hidden" id="settings-modal">
  <div class="modal">
    <h2>⚙ Configuración</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Tarifa por hora (MXN)</label>
        <input type="number" id="s-rate" value="500" min="1">
      </div>
      <div class="form-group full">
        <label>Meta horas/día</label>
        <input type="number" id="s-goal-h" value="8" step="0.5" min="1">
      </div>
      <div class="form-group full">
        <label>Meta acciones/día</label>
        <input type="number" id="s-goal-a" value="15" min="1">
      </div>
      <div class="form-group full">
        <label>OpenRouter API Key</label>
        <input type="password" id="s-apikey" placeholder="sk-or-...">
      </div>
      <div class="form-group full">
        <label>Modelo chatbot</label>
        <select id="s-model">
          <option value="google/gemini-flash-1.5">Gemini Flash 1.5 (rápido)</option>
          <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
          <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
          <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('settings-modal')">Cancelar</button>
      <button class="btn-save" onclick="saveSettings()">Guardar</button>
    </div>
  </div>
</div>

<!-- CHATBOT -->
<button id="chatbot-btn" onclick="toggleChat()">🤖</button>
<div id="chatbot-panel" class="hidden">
  <div id="chat-header">
    <h3>🤖 Asistente Victor IA</h3>
    <button id="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div id="chat-msgs">
    <div class="chat-msg system">Hola Victor. Pregúntame lo que quieras sobre el desempeño de la empresa.</div>
  </div>
  <div id="chat-quick">

// ===== HELPERS: DURATION =====
function secsToHMS(secs){
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
  if(h>0) return `${h}h ${m}m ${s>0?s+'s':''}`.trim();
  if(m>0) return `${m}m ${s>0?s+'s':''}`.trim();
  return `${s}s`;
}
function durToSecs(e){
  if(e.durSec!=null) return e.durSec;
  return Math.round(e.dur*3600);
}
function minsToLabel(mins){
  if(mins<60) return mins+'m';
  const h=Math.floor(mins/60),m=mins%60;
  return m>0?`${h}h ${m}m`:`${h}h`;
}
function secsToHoursDecimal(s){return s/3600;}

// COSTO DE PRODUCCIÓN = solo software/API (proporcional al tiempo usado)
function costForEntry(e){
  const h=durToSecs(e)/3600;
  return Math.round((e.sw||[]).reduce((s,id)=>s+((SW_COST_MAP[id]||0)/176)*h,0));
}
// PRECIO DE VENTA = tarifa pública × horas (lo que se cobra al cliente)
function priceForEntry(e){
  const h=durToSecs(e)/3600;

}
// MARGEN BRUTO = precio venta - costo producción
function marginForEntry(e){return priceForEntry(e)-costForEntry(e);}

// ===== PERIOD FILTER =====
let activePeriod = 'today';
let periodFrom = '';
let periodTo = '';

function getPeriodRange(period){
  const now = new Date();
  const pad = n=>String(n).padStart(2,'0');
  const fmt = d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const today = fmt(now);
  switch(period){
    case 'hour': {
      // entries within the current hour (by dateKey + hora)
      return {type:'hour', h:now.getHours()};
    }
    case 'today': return {type:'range',from:today,to:today};
    case 'week': {
      const dow=now.getDay();
      const mon=new Date(now); mon.setDate(now.getDate()-dow+1);
      const sun=new Date(mon); sun.setDate(mon.getDate()+6);
      return {type:'range',from:fmt(mon),to:fmt(sun)};
    }
    case 'month': {
      const from=`${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;
      const last=new Date(now.getFullYear(),now.getMonth()+1,0);
      return {type:'range',from,to:fmt(last)};
    }
    case 'year': {
      return {type:'range',from:`${now.getFullYear()}-01-01`,to:`${now.getFullYear()}-12-31`};
    }
    case 'custom': return {type:'range',from:periodFrom,to:periodTo};
    default: return {type:'all'};
  }
}

function filterByPeriod(entries, period){
  const range = getPeriodRange(period);
  if(range.type==='all') return entries;
  if(range.type==='hour'){
    return entries.filter(e=>{
      const today=new Date().toISOString().split('T')[0];
      const h=parseInt((e.hora||'00:00').split(':')[0]);
      return e.dateKey===today && h===range.h;
    });
  }
  return entries.filter(e=>e.dateKey>=range.from && e.dateKey<=range.to);
}

function setPeriod(p){
  activePeriod=p;
  document.querySelectorAll('.period-btn').forEach(b=>{
    const m=(b.getAttribute('onclick')||'').match(/'([^']+)'/);
    b.classList.toggle('active',m&&m[1]===p);
  });
  document.getElementById('period-custom').classList.toggle('show',p==='custom');
  applyAllFilters();
  updatePeriodSummary();
}
function applyCustomPeriod(){
  periodFrom=document.getElementById('period-from').value;
  periodTo=document.getElementById('period-to').value;
  activePeriod='custom';
  applyAllFilters();
  updatePeriodSummary();
}
function updatePeriodSummary(){
  const labels={hour:`Hora actual (${new Date().getHours()}:00)`,today:'Hoy',week:'Esta semana',month:'Este mes',year:'Este año',all:'Todo el período',custom:'Rango custom'};
  let txt=labels[activePeriod]||activePeriod;
  if(activePeriod==='custom'&&periodFrom&&periodTo) txt=`${periodFrom} → ${periodTo}`;
  const el=document.getElementById('period-summary');
  if(el) el.textContent=`📅 ${txt} — ${filteredEntries.length} entradas`;
}

// ===== KPIs =====
function calcKPIs(entries){
  const total=entries.length;
  const totalSecs=entries.reduce((a,e)=>a+durToSecs(e),0);
  const totalHours=totalSecs/3600;
  const dates=[...new Set(entries.map(e=>e.dateKey))];
  const days=dates.length||1;
  const avgHoursPerDay=totalHours/days;
  const avgActionsPerDay=total/days;
  const hourCounts={};
  entries.forEach(e=>{const h=parseInt((e.hora||'0:0').split(':')[0]);hourCounts[h]=(hourCounts[h]||0)+1;});
  const peakHour=Object.entries(hourCounts).sort((a,b)=>b[1]-a[1])[0];
  const done=entries.filter(e=>e.status==='Completado').length;
  const compRate=total?Math.round(done/total*100):0;
  const rw=entries.filter(e=>e.rework).length;
  const reworkRate=total?Math.round(rw/total*100):0;
  const costMXN=totalHours*settings.rate;
  const costUSD=(costMXN/17).toFixed(0);
  const prompts=entries.filter(e=>e.cat==='IA/Automatización').length;
  const deploys=entries.filter(e=>(e.tags||[]).includes('dev')&&e.status==='Completado').length;
  // streak from today backwards
  let streak=0;
  const check=new Date();
  while(streak<365){
    const dk=check.toISOString().split('T')[0];
    if(allEntries.some(e=>e.dateKey===dk)){streak++;check.setDate(check.getDate()-1);}
    else break;
  }
  const projH={};entries.forEach(e=>{if(e.project) projH[e.project]=(projH[e.project]||0)+durToSecs(e)/3600;});
  const topProject=Object.entries(projH).sort((a,b)=>b[1]-a[1])[0];
  const cliH={};entries.forEach(e=>{if(e.client) cliH[e.client]=(cliH[e.client]||0)+durToSecs(e)/3600;});
  const topClient=Object.entries(cliH).sort((a,b)=>b[1]-a[1])[0];
  const totalCost=entries.reduce((a,e)=>a+costForEntry(e),0);
  const totalPrice=entries.reduce((a,e)=>a+priceForEntry(e),0);
  const totalMargin=totalPrice-totalCost;
  const marginRate=totalPrice>0?Math.round(totalMargin/totalPrice*100):0;
  // Prompt engineering metrics
  const withPrompts=entries.filter(e=>e.promptCount>0);
  const totalPrompts=withPrompts.reduce((a,e)=>a+(e.promptCount||1),0);
  const avgPrompts=withPrompts.length?totalPrompts/withPrompts.length:1;
  const oneShotCount=withPrompts.filter(e=>e.promptCount===1).length;
  const oneShotRate=withPrompts.length?Math.round(oneShotCount/withPrompts.length*100):100;
  const promptScore=Math.max(0,Math.round(100-(avgPrompts-1)*20)); // 1 prompt=100, 6 prompts=0
  const promptByCat={};
  withPrompts.forEach(e=>{
    const k=e.promptCat||e.cat||'Sin categoría';
    if(!promptByCat[k]) promptByCat[k]={sum:0,n:0};
    promptByCat[k].sum+=e.promptCount||1;promptByCat[k].n++;
  });
  const promptAvgByCat=Object.entries(promptByCat).map(([k,v])=>([k,v.sum/v.n])).sort((a,b)=>b[1]-a[1]);
  const worstPromptEntries=[...withPrompts].sort((a,b)=>(b.promptCount||1)-(a.promptCount||1)).slice(0,10);
  return {total,totalSecs,totalHours,days,avgHoursPerDay,avgActionsPerDay,peakHour,compRate,reworkRate,costMXN,costUSD,prompts,deploys,streak,topProject,topClient,totalCost,totalPrice,totalMargin,marginRate,avgPrompts,oneShotRate,promptScore,promptByCat,promptAvgByCat,worstPromptEntries,withPromptsLen:withPrompts.length};
}

    const cost=costForEntry(e);
    const price=priceForEntry(e);
    const margin=price-cost;
    const marginPct=price>0?Math.round(margin/price*100):0;
    const pc=e.promptCount||0;
    const pcClass=pc===0?'':pc===1?'prompt-1':pc<=3?'prompt-2':pc<=6?'prompt-3':'prompt-high';
    const pcLabel=pc===0?'':pc===1?'1-shot ✨':pc<=3?`${pc} prompts`:pc<=6?`${pc} prompts ⚠`:` ${pc} prompts 🔴`;
    return `
      <div class="feed-item">

function buildPromptChart(entries){

    return {label:dk.slice(5),avg:dayE.length?+(dayE.reduce((a,e)=>a+(e.promptCount||1),0)/dayE.length).toFixed(2):null};

  const ctx=document.getElementById('ch-prompt-trend');

        borderColor:'#3b82f6',
        backgroundColor:'rgba(59,130,246,.1)',
        fill:true,tension:0.3,pointRadius:4,
        spanGaps:true
      },{
        label:'Meta (≤3)',
        data:last7.map(()=>3),
        borderColor:'rgba(34,197,94,.5)',
        borderDash:[4,4],pointRadius:0,fill:false
      }]

    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'rgba(245,241,232,.7)',font:{size:10}}}},scales:{x:{ticks:{color:'rgba(245,241,232,.5)',font:{size:9}},grid:{color:'rgba(245,241,232,.05)'}},y:{min:0,ticks:{color:'rgba(245,241,232,.5)',font:{size:9}},grid:{color:'rgba(245,241,232,.05)'}}}}
  });
}

function buildCharts(entries){
  const colors=['#FFAA17','#3b82f6','#22c55e','#a855f7','#ef4444','#14b8a6','#f97316','#ec4899'];
  const catData={};
  entries.forEach(e=>{catData[e.cat]=(catData[e.cat]||0)+durToSecs(e)/3600;});
  const catCtx=document.getElementById('ch-cat');
  if(catCtx){
    charts['ch-cat']=new Chart(catCtx,{type:'doughnut',data:{labels:Object.keys(catData),datasets:[{data:Object.values(catData).map(v=>v.toFixed(2)),backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'rgba(245,241,232,.7)',font:{size:10},boxWidth:10}}}}});
  }
  const hourData=Array(24).fill(0);
  entries.forEach(e=>{const h=parseInt((e.hora||'0:0').split(':')[0]);if(h>=0&&h<24) hourData[h]++;});
  const hourCtx=document.getElementById('ch-hour');
  if(hourCtx){
    charts['ch-hour']=new Chart(hourCtx,{type:'bar',data:{labels:Array.from({length:24},(_,i)=>i+':00'),datasets:[{data:hourData,backgroundColor:'rgba(255,170,23,.6)',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'rgba(245,241,232,.5)',font:{size:9}},grid:{color:'rgba(245,241,232,.05)'}},y:{ticks:{color:'rgba(245,241,232,.5)',font:{size:9}},grid:{color:'rgba(245,241,232,.05)'}}}}});
  }
  const dateMap={};
  entries.forEach(e=>{
    if(!dateMap[e.dateKey]) dateMap[e.dateKey]={actions:0,secs:0};
    dateMap[e.dateKey].actions++;
    dateMap[e.dateKey].secs+=durToSecs(e);
  });
  const sortedDates=Object.keys(dateMap).sort();
  const dailyCtx=document.getElementById('ch-daily');
  if(dailyCtx){
    charts['ch-daily']=new Chart(dailyCtx,{type:'bar',data:{labels:sortedDates.map(d=>d.slice(5)),datasets:[{label:'Acciones',data:sortedDates.map(d=>dateMap[d].actions),backgroundColor:'rgba(255,170,23,.6)',borderRadius:3,yAxisID:'y'},{label:'Horas',data:sortedDates.map(d=>(dateMap[d].secs/3600).toFixed(2)),type:'line',borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',fill:true,tension:0.3,pointRadius:3,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index'},plugins:{legend:{labels:{color:'rgba(245,241,232,.7)',font:{size:10}}}},scales:{x:{ticks:{color:'rgba(245,241,232,.5)',font:{size:9}},grid:{color:'rgba(245,241,232,.05)'}},y:{ticks:{color:'rgba(245,241,232,.5)',font:{size:9}},grid:{color:'rgba(245,241,232,.05)'}},y1:{position:'right',ticks:{color:'rgba(59,130,246,.7)',font:{size:9}},grid:{display:false}}}}});
  }
}

function buildBars(entries){
  function fillBar(id,data,fmt){
    const el=document.getElementById(id);if(!el)return;
    const max=Math.max(...data.map(d=>d[1]),0.01);
    el.innerHTML=data.slice(0,8).map(([l,v])=>`<div class="bar-item"><div class="bar-label">${l}</div><div class="bar-track"><div class="bar-fill" style="width:${v/max*100}%"></div></div><div class="bar-val">${fmt(v)}</div></div>`).join('');
  }
  const projH={},cliH={};
  entries.forEach(e=>{
    if(e.project) projH[e.project]=(projH[e.project]||0)+durToSecs(e);
    if(e.client) cliH[e.client]=(cliH[e.client]||0)+durToSecs(e);
  });
  fillBar('bars-project',Object.entries(projH).sort((a,b)=>b[1]-a[1]),v=>secsToHMS(v));
  fillBar('bars-client',Object.entries(cliH).sort((a,b)=>b[1]-a[1]),v=>secsToHMS(v));
  const hoursEl=document.getElementById('bars-hours');
  if(hoursEl){
    const byDur=[...entries].sort((a,b)=>durToSecs(b)-durToSecs(a)).slice(0,8);
    const max=durToSecs(byDur[0]||{durSec:1});
    hoursEl.innerHTML=byDur.map(e=>`<div class="bar-item"><div class="bar-label" title="${e.desc}">${e.desc.slice(0,28)}</div><div class="bar-track"><div class="bar-fill" style="width:${durToSecs(e)/max*100}%"></div></div><div class="bar-val">${secsToHMS(durToSecs(e))}</div></div>`).join('');
  }
}

function buildHeatmap(entries){
  const el=document.getElementById('heatmap-container');if(!el)return;
  const today=new Date();
  const days=[];
  for(let i=41;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push(d.toISOString().split('T')[0]);}
  const dayCounts={};entries.forEach(e=>{dayCounts[e.dateKey]=(dayCounts[e.dateKey]||0)+1;});
  const startDow=new Date(days[0]).getDay();
  const cells=[];
  for(let i=0;i<startDow;i++) cells.push('<div></div>');
  days.forEach(d=>{
    const c=dayCounts[d]||0;
    const lvl=c===0?0:c<3?1:c<6?2:c<10?3:4;
    cells.push(`<div class="hm-cell hm-${lvl}" title="${d}: ${c} acciones">${c||''}</div>`);
  });
  const dayNames=['D','L','M','X','J','V','S'];
  el.innerHTML=`<div class="hm-days">${dayNames.map(d=>`<div class="hm-day">${d}</div>`).join('')}</div><div class="heatmap-grid">${cells.join('')}</div><div style="font-size:11px;color:var(--bone2);margin-top:8px">Últimas 6 semanas — ${entries.length} entradas en período</div>`;
}

function destroyCharts(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts={};
}

function renderSoftware(){
  const swHours={},swUses={};
  allEntries.forEach(e=>{(e.sw||[]).forEach(id=>{swHours[id]=(swHours[id]||0)+durToSecs(e)/3600;swUses[id]=(swUses[id]||0)+1;});});
  const totalHours=allEntries.reduce((a,e)=>a+durToSecs(e)/3600,0)||1;
  function allocCost(sw){
    if(sw.cost===0) return 0;
    return Math.round(sw.cost*((swHours[sw.id]||0)/totalHours));
  }
  const totalMonthlyCost=SOFTWARE.reduce((a,s)=>a+s.cost,0);
  const totalAllocated=SOFTWARE.reduce((a,s)=>a+allocCost(s),0);

  document.getElementById('view-software').innerHTML=`

// ===== ENTRADAS VIEW =====
function renderEntradas(){
  const sorted=[...filteredEntries].sort((a,b)=>{
    const av=a[sortCol]??'',bv=b[sortCol]??'';
    if(sortCol==='dur') return sortDir*(durToSecs(b)-durToSecs(a));
    return sortDir*(av>bv?1:av<bv?-1:0);
  });
  const totalPages=Math.ceil(sorted.length/PAGE_SIZE);
  if(page>=totalPages) page=Math.max(0,totalPages-1);
  const pageEntries=sorted.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);

  const catTag=cat=>{const m={Desarrollo:'dev',Marketing:'mkt',Diseño:'des','IA/Automatización':'ai',Video:'vid',Operaciones:'ops','Ventas/CRM':'mkt',Reunión:'ops'};return`<span class="tag tag-${m[cat]||'ops'}">${cat}</span>`;};
  const statusBadge=s=>{const m={Completado:'done','En progreso':'prog',Revisión:'rev'};return`<span class="badge-status s-${m[s]||'prog'}">${s}</span>`;};
  const swBadges=(sw=[])=>sw.map(id=>{const s=SOFTWARE.find(x=>x.id===id);return s?`<span class="feed-sw-tag">${s.name}</span>`:''}).join('');

  document.getElementById('view-entradas').innerHTML=`
    <div class="export-row">
      <button onclick="exportCSV()">📥 Export CSV</button>
      <span style="font-size:12px;color:var(--bone2)">${filteredEntries.length} entradas · ${secsToHMS(filteredEntries.reduce((a,e)=>a+durToSecs(e),0))} · $${filteredEntries.reduce((a,e)=>a+costForEntry(e),0).toLocaleString()} MXN</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortTable('dateKey')">Fecha${sortCol==='dateKey'?sortDir>0?' ▲':' ▼':''}</th>
            <th onclick="sortTable('hora')">Hora</th>
            <th onclick="sortTable('desc')">Descripción</th>
            <th onclick="sortTable('cat')">Categoría</th>
            <th onclick="sortTable('project')">Proyecto</th>
            <th onclick="sortTable('dur')">Duración</th>
            <th>Costo</th>
            <th onclick="sortTable('status')">Estado</th>
            <th>Software</th>
            <th>Por qué / Para qué / Logro</th>
            <th>Obs</th>
            <th>RW</th>
            <th>✏</th>
          </tr>
        </thead>
        <tbody>
          ${pageEntries.map(e=>`
            <tr>
              <td style="white-space:nowrap">${e.dateKey}</td>
              <td>${e.hora||'—'}</td>
              <td style="max-width:200px;word-break:break-word">${e.desc}</td>
              <td>${catTag(e.cat)}</td>
              <td style="color:var(--bone2);white-space:nowrap">${e.project||'—'}</td>
              <td style="color:var(--amber);font-weight:700;white-space:nowrap">${secsToHMS(durToSecs(e))}</td>
              <td style="color:var(--green);white-space:nowrap">$${costForEntry(e).toLocaleString()}</td>
              <td>${statusBadge(e.status)}</td>
              <td style="max-width:120px">${swBadges(e.sw)}</td>
              <td style="max-width:180px;font-size:10px;line-height:1.6">
                ${e.why?`<div><span style="color:var(--bone2)">❓</span> ${e.why.slice(0,40)}${e.why.length>40?'...':''}</div>`:''}
                ${e.forwhat?`<div><span style="color:#86efac">🎯</span> ${e.forwhat.slice(0,40)}${e.forwhat.length>40?'...':''}</div>`:''}
                ${e.result?`<div><span style="color:var(--blue)">✅</span> ${e.result.slice(0,40)}${e.result.length>40?'...':''}</div>`:''}
              </td>
              <td style="max-width:120px;font-size:11px;color:var(--amber);font-style:italic">${(e.obs||'').slice(0,35)+(e.obs&&e.obs.length>35?'...':'')}</td>
              <td style="text-align:center">${e.rework?'<span style="color:var(--red)">⚠</span>':'—'}</td>
              <td><button onclick="openEdit('${e.id}')" style="background:var(--surface2);border:1px solid var(--border);color:var(--bone2);padding:3px 8px;border-radius:4px;font-size:11px">✏</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <button onclick="goPage(0)" ${page===0?'disabled':''}>«</button>
      <button onclick="goPage(${page-1})" ${page===0?'disabled':''}>‹ Ant</button>
      <span>Pág ${page+1} de ${totalPages||1}</span>
      <button onclick="goPage(${page+1})" ${page>=totalPages-1?'disabled':''}>Sig ›</button>
      <button onclick="goPage(${totalPages-1})" ${page>=totalPages-1?'disabled':''}>»</button>
    </div>
  `;
}

function sortTable(col){
  if(sortCol===col) sortDir*=-1;
  else{sortCol=col;sortDir=-1;}
  renderEntradas();
}
function goPage(p){page=p;renderEntradas();}

  const entry={

    dateKey:document.getElementById('e-date').value,
    hora:document.getElementById('e-hora').value,

    why:document.getElementById('e-why').value.trim(),

    result:document.getElementById('e-result').value.trim(),
    obs:document.getElementById('e-obs').value.trim(),

    durSec:totalSecs,
    project:document.getElementById('e-project').value.trim(),
    client:document.getElementById('e-client').value.trim(),

    promptWinner:document.getElementById('e-prompt-winner').value.trim(),
    promptNotes:document.getElementById('e-prompt-notes').value.trim(),
    sw,tags:[],
  };
  if(editingId){

    if(idx>=0) customEntries[idx]=entry; else customEntries.push(entry);
  } else {

  saveCustomEntries();

  applyAllFilters();
  closeModal('entry-modal');
}

function exportCSV(){
  const headers=['ID','Fecha','Hora','Descripción','Por qué','Para qué','Qué se logró','Observaciones','Categoría','Proyecto','Cliente','Duración (H:M:S)','Duración (seg)','Costo MXN','Estado','Prioridad','Software','Retrabajo','Prompts Necesarios','Categoría Prompt','Prompt Ganador','Notas Prompting','Notas'];
  const rows=filteredEntries.map(e=>[
    e.id,e.dateKey,e.hora||'',
    `"${(e.desc||'').replace(/"/g,'""')}"`,
    `"${(e.why||'').replace(/"/g,'""')}"`,
    `"${(e.forwhat||'').replace(/"/g,'""')}"`,
    `"${(e.result||'').replace(/"/g,'""')}"`,
    `"${(e.obs||'').replace(/"/g,'""')}"`,
    e.cat,e.project||'',e.client||'',
    secsToHMS(durToSecs(e)),durToSecs(e),costForEntry(e),
    e.status,e.priority||'',
    (e.sw||[]).join('|'),e.rework?1:0,
    e.promptCount||1,e.promptCat||'',
    `"${(e.promptWinner||'').replace(/"/g,'""')}"`,
    `"${(e.promptNotes||'').replace(/"/g,'""')}"`,
    `"${(e.notes||'').replace(/"/g,'""')}"`
  ]);
  const csv=[headers,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);
  a.download='victor-ia-tracker-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

// ===== CHATBOT =====
function toggleChat(){document.getElementById('chatbot-panel').classList.toggle('hidden');}
function quickQ(q){document.getElementById('chat-input').value=q;sendChat();}
async function sendChat(){
  const input=document.getElementById('chat-input');
  const q=input.value.trim();if(!q)return;
  if(!settings.apiKey){addChatMsg('bot','⚠ Configura tu OpenRouter API key en ⚙ Config.');return;}
  input.value='';
  addChatMsg('user',q);
  const typing=addChatMsg('bot','<em>Pensando...</em>');
  chatHistory.push({role:'user',content:q});
  if(chatHistory.length>12) chatHistory=chatHistory.slice(-12);
  try{
    const res=await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{'Authorization':'Bearer '+settings.apiKey,'Content-Type':'application/json','HTTP-Referer':'https://victor-ia-tracker.vercel.app','X-Title':'Victor IA Tracker'},
      body:JSON.stringify({model:settings.model,messages:[{role:'system',content:buildChatContext()},...chatHistory],max_tokens:1024})
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    const reply=data.choices[0].message.content;
    typing.innerHTML=reply.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    chatHistory.push({role:'assistant',content:reply});
  }catch(err){typing.innerHTML='❌ '+err.message;}
}
function addChatMsg(role,text){
  const msgs=document.getElementById('chat-msgs');
  const div=document.createElement('div');div.className='chat-msg '+role;div.innerHTML=text;
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;return div;
}
function buildChatContext(){
  const kpis=calcKPIs(allEntries);
  const topP=getTopProjects(allEntries,3).map(([p,h])=>`${p}:${secsToHMS(Math.round(h*3600))}`).join(', ');
  const topC=getTopCats(allEntries,3).map(([c,h])=>`${c}:${secsToHMS(Math.round(h*3600))}`).join(', ');
  const topSW=getTopSW(allEntries,5).map(([id,n])=>{const s=SOFTWARE.find(x=>x.id===id);return`${s?s.name:id}:${n}usos`;}).join(', ');
  const reworks=allEntries.filter(e=>e.rework).map(e=>`"${e.desc.slice(0,40)}"`).join(', ');
  const recent=allEntries.slice(-10).map(e=>`[${e.dateKey} ${e.hora}] ${e.cat}: ${e.desc.slice(0,50)} (${secsToHMS(durToSecs(e))}, $${costForEntry(e)} MXN)${e.why?' | PorQué:'+e.why.slice(0,30):''}${e.result?' | Logrado:'+e.result.slice(0,30):''}${e.obs?' | Obs:'+e.obs.slice(0,30):''}`).join('\n');
  const swCosts=SOFTWARE.filter(s=>s.cost>0).map(s=>`${s.name}:$${s.cost}/mes`).join(', ');
  const pkpis=calcKPIs(allEntries);
  const promptAnalysis=pkpis.promptAvgByCat.slice(0,5).map(([k,v])=>`${k}:${v.toFixed(1)} avg`).join(', ');
  const topWinners=allEntries.filter(e=>e.promptWinner&&e.promptCount===1).slice(-3).map(e=>`[${e.cat}] "${e.promptWinner.slice(0,60)}"`).join('; ');
  return `Eres el asistente de performance de Victor IA, agencia de IA en México. Tienes acceso completo a los datos de productividad. Responde en español, formal o coloquial según te lo pidan.

MÉTRICAS GLOBALES:
- Total acciones: ${kpis.total} en ${kpis.days} días
- Tiempo total: ${secsToHMS(kpis.totalSecs)} | Prom/día: ${secsToHMS(Math.round(kpis.totalSecs/kpis.days))}
- Prom por acción: ${secsToHMS(Math.round(kpis.totalSecs/kpis.total))}
- Costo/acción prom: $${Math.round(kpis.totalCost/kpis.total)} MXN
- Valor generado total: $${kpis.totalCost.toLocaleString()} MXN
- Completado: ${kpis.compRate}% | Retrabajo: ${kpis.reworkRate}%
- Racha: ${kpis.streak} días | Tarifa: $${settings.rate}/h

TOP PROYECTOS: ${topP}
TOP CATEGORÍAS: ${topC}
SOFTWARE MÁS USADO: ${topSW}
RETRABAJOS: ${reworks||'ninguno'}

COSTOS SOFTWARE/MES:
${swCosts}

PROMPT ENGINEERING:
- Score global: ${pkpis.promptScore}/100 | Prompts prom: ${pkpis.avgPrompts.toFixed(1)} | 1-Shot rate: ${pkpis.oneShotRate}%
- Por categoría: ${promptAnalysis||'sin datos'}
- Prompts 1-shot recientes: ${topWinners||'ninguno registrado'}

ÚLTIMAS 10 ACCIONES:
${recent}

Responde con datos concretos, insights y recomendaciones accionables.`;
}

function renderReportes(){
  const el=document.getElementById('view-reportes');
  const entries=filteredEntries;

  const catColors={'Desarrollo':'#3b82f6','Video':'#c084fc','IA/Automatización':'#FFAA17','Marketing':'#ec4899',
    'Diseño':'#a855f7','Operaciones':'#22c55e','Reunión':'#14b8a6','Investigación':'#f97316','Sin categoría':'#6b7280'};

  // Group by dept
  const byDept={};
  entries.forEach(e=>{const d=e.cat||'Sin categoría';if(!byDept[d])byDept[d]=[];byDept[d].push(e);});
  const depts=Object.entries(byDept).sort((a,b)=>b[1].reduce((s,e)=>s+durToSecs(e),0)-a[1].reduce((s,e)=>s+durToSecs(e),0));

  // Group by date
  const byDate={};
  entries.forEach(e=>{if(!byDate[e.dateKey])byDate[e.dateKey]=[];byDate[e.dateKey].push(e);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));

  const totalH=entries.reduce((s,e)=>s+durToSecs(e),0)/3600;
  const totalCost=entries.reduce((s,e)=>s+costForEntry(e),0);

  const deptCards=depts.map(([dept,dE])=>{
    const dH=dE.reduce((s,e)=>s+durToSecs(e),0)/3600;
    const dC=dE.reduce((s,e)=>s+costForEntry(e),0);
    const pct=totalH>0?Math.round(dH/totalH*100):0;
    const col=catColors[dept]||'#6b7280';
    const sorted=[...dE].sort((a,b)=>b.dateKey.localeCompare(a.dateKey)||(b.hora||'').localeCompare(a.hora||''));
    return `<div class="rep-dept-card" style="--dc:${col}">
      <div class="rep-dept-header">
        <div class="rep-dept-name" style="color:${col}">${dept}</div>
        <div class="rep-dept-pct">${pct}%</div>
      </div>
      <div class="rep-dept-bar"><div class="rep-dept-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="rep-dept-stats">
        <span>⏱ ${dH.toFixed(1)}h</span>
        <span>💵 $${dC.toLocaleString()}</span>
        <span>📌 ${dE.length} acc.</span>
      </div>
      <div class="rep-dept-actions">
        ${sorted.slice(0,5).map(e=>`<div class="rep-dept-action">
          <span class="rep-da-date">${e.dateKey}</span>
          <span class="rep-da-desc" title="${e.desc}">${e.desc.slice(0,48)}${e.desc.length>48?'…':''}</span>
          <span class="rep-da-dur">${secsToHMS(durToSecs(e))}</span>
        </div>`).join('')}
        ${sorted.length>5?`<div class="rep-dept-more">+${sorted.length-5} acciones más</div>`:''}
      </div>
    </div>`;
  }).join('');

  const dailyReports=dates.slice(0,21).map(date=>{
    const dE=[...byDate[date]].sort((a,b)=>(a.hora||'').localeCompare(b.hora||''));
    const dH=dE.reduce((s,e)=>s+durToSecs(e),0)/3600;
    const dC=dE.reduce((s,e)=>s+costForEntry(e),0);
    let dayLabel='';
    try{dayLabel=new Date(date+'T12:00:00').toLocaleDateString('es-MX',{weekday:'long',day:'2-digit',month:'short',year:'numeric'});}catch(x){dayLabel=date;}
    return `<div class="rep-day-card">
      <div class="rep-day-header">
        <div class="rep-day-date">
          <span class="rep-day-label">${dayLabel}</span>
          <span class="rep-day-key">${date}</span>
        </div>
        <div class="rep-day-totals">
          <span class="rep-day-stat">⏱ ${dH.toFixed(1)}h</span>
          <span class="rep-day-stat">💵 $${dC.toLocaleString()}</span>
          <span class="rep-day-stat">📌 ${dE.length} acciones</span>
          ${dE.filter(e=>e.rework).length>0?`<span class="rep-day-stat" style="color:#ef4444;background:rgba(239,68,68,.1)">↺ ${dE.filter(e=>e.rework).length} retrabajo</span>`:''}
        </div>
      </div>
      <div class="rep-day-timeline">
        ${dE.map(e=>{
          const col=catColors[e.cat]||'#6b7280';
          const sCol=e.status==='Completado'?'#22c55e':e.status==='En progreso'?'#FFAA17':'#6b7280';
          return `<div class="rep-timeline-row">
            <div class="rep-tl-time">${e.hora||'——'}</div>
            <div class="rep-tl-dot" style="background:${col}"></div>
            <div class="rep-tl-body">
              <div class="rep-tl-desc">${e.desc}</div>
              <div class="rep-tl-meta">
                <span class="rep-tl-cat" style="color:${col}">${e.cat}</span>
                ${e.project?`<span class="rep-tl-proj">${e.project}</span>`:''}
                <span class="rep-tl-dur">${secsToHMS(durToSecs(e))}</span>
                <span class="rep-tl-cost" title="Costo producción">💰$${costForEntry(e).toLocaleString()}</span>
                <span style="font-size:10px;color:#22c55e;font-weight:700" title="Precio venta">💵$${priceForEntry(e).toLocaleString()}</span>
                <span class="rep-tl-status" style="color:${sCol}">${e.status}</span>
                ${e.rework?'<span class="rep-tl-rework">↺ retrabajo</span>':''}
                ${e.promptCount>0?`<span style="font-size:10px;color:#3b82f6">${e.promptCount} prompt${e.promptCount>1?'s':''}</span>`:''}
              </div>
              ${e.obs?`<div class="rep-tl-obs">💬 ${e.obs}</div>`:''}
              ${e.result?`<div class="rep-tl-obs" style="color:#86efac">✅ ${e.result}</div>`:''}
              ${e.why?`<div class="rep-tl-obs" style="color:var(--bone2)">❓ ${e.why}</div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  // ---- Project cost breakdown by phase ----
  const byProject={};
  entries.forEach(e=>{
    const p=e.project||'Sin proyecto';
    if(!byProject[p]) byProject[p]={entries:[],phases:{}};
    byProject[p].entries.push(e);
    const ph=e.phase||'Sin fase';
    if(!byProject[p].phases[ph]) byProject[p].phases[ph]=[];
    byProject[p].phases[ph].push(e);
  });
  const phaseOrder=['Ideación','Creativo','Ejecución','Revisión','Entrega','Sin fase'];
  const phaseColors={Ideación:'#f97316',Creativo:'#a855f7',Ejecución:'#3b82f6',Revisión:'#14b8a6',Entrega:'#22c55e','Sin fase':'#6b7280'};
  const projectReports=Object.entries(byProject).sort((a,b)=>{
    const ah=a[1].entries.reduce((s,e)=>s+durToSecs(e),0);
    const bh=b[1].entries.reduce((s,e)=>s+durToSecs(e),0);
    return bh-ah;
  }).map(([proj,data])=>{
    const pH=data.entries.reduce((s,e)=>s+durToSecs(e),0)/3600;
    const pCost=data.entries.reduce((s,e)=>s+costForEntry(e),0);
    const pPrice=data.entries.reduce((s,e)=>s+priceForEntry(e),0);
    const pMargin=pPrice-pCost;
    const pMgRate=pPrice>0?Math.round(pMargin/pPrice*100):0;
    const phaseRows=phaseOrder.filter(ph=>data.phases[ph]).map(ph=>{
      const phE=data.phases[ph];
      const phH=phE.reduce((s,e)=>s+durToSecs(e),0)/3600;
      const phCost=phE.reduce((s,e)=>s+costForEntry(e),0);
      const phPrice=phE.reduce((s,e)=>s+priceForEntry(e),0);
      const phPct=pH>0?Math.round(phH/pH*100):0;
      const col=phaseColors[ph]||'#6b7280';
      return `<div class="rep-phase-row">
        <span class="rep-phase-name" style="color:${col}">${ph}</span>
        <span class="rep-phase-bar-wrap"><span class="rep-phase-bar" style="width:${phPct}%;background:${col}"></span></span>
        <span class="rep-phase-h">${phH.toFixed(1)}h</span>
        <span class="rep-phase-cost internal-only">💰$${phCost.toLocaleString()}</span>
        <span class="rep-phase-price">💵$${phPrice.toLocaleString()}</span>
      </div>`;
    }).join('');
    return `<div class="rep-project-card">
      <div class="rep-project-header">
        <span class="rep-project-name">${proj}</span>
        <div class="rep-project-stats">
          <span>${pH.toFixed(1)}h · ${data.entries.length} acc.</span>
          <span class="internal-only" style="color:#f97316">💰 $${pCost.toLocaleString()}</span>
          <span style="color:#22c55e">💵 $${pPrice.toLocaleString()}</span>
          <span class="internal-only" style="color:var(--amber)">📈 ${pMgRate}% margen</span>
        </div>
      </div>
      ${phaseRows?`<div class="rep-phase-list">${phaseRows}</div>`:'<div style="font-size:10px;color:rgba(245,241,232,.3);padding:8px 0">Sin fases registradas — agrega fase en cada entrada</div>'}
    </div>`;
  }).join('');

  el.innerHTML=`<div style="padding:16px 20px;max-width:1200px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <h2 style="font-size:16px;font-weight:800;color:var(--bone);margin:0">📑 Reportes — Victor IA</h2>
      <div style="font-size:11px;color:var(--bone2);background:rgba(255,170,23,.1);border:1px solid rgba(255,170,23,.3);border-radius:6px;padding:4px 10px">
        ${entries.length} acciones · ${totalH.toFixed(1)}h
        <span class="internal-only"> · 💰 $${totalCost.toLocaleString()} costo</span>
        · 💵 $${entries.reduce((s,e)=>s+priceForEntry(e),0).toLocaleString()} venta
      </div>
    </div>

    <div class="section-title">📁 Por Departamento / Área</div>
    <div class="rep-dept-grid">${deptCards||'<div style="color:var(--bone2);padding:20px">Sin datos</div>'}</div>

    <div class="section-title" style="margin-top:24px">🗂 Por Proyecto (con desglose por fase)</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px">
      ${projectReports||'<div style="color:var(--bone2);padding:20px;text-align:center">Sin proyectos en el período</div>'}
    </div>

    <div class="section-title">
      📅 Reportes Diarios
      <span style="font-size:10px;color:var(--bone2);font-weight:400;margin-left:8px">
        ${dates.length} días · mostrando ${Math.min(dates.length,21)}
      </span>
    </div>
    <div class="rep-daily">
      ${dailyReports||'<div style="color:var(--bone2);padding:20px;text-align:center">No hay entradas en el período seleccionado</div>'}
    </div>
  </div>`;
}

        return `
          <div class="chart-card" style="border-left:3px solid ${d.color}">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
              <div>
                <div style="font-size:14px;font-weight:800;color:${d.color}">${d.nombre}</div>
                <div style="font-size:11px;color:var(--bone2)">${d.director}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:18px;font-weight:800;color:var(--amber)">${secsToHMS(Math.round(h*3600))}</div>
                <div style="font-size:10px;color:var(--bone2)">${entries.length} acciones · $${costDept.toLocaleString()} MXN</div>
              </div>
            </div>
            <div style="font-size:11px;color:var(--bone2);margin-bottom:10px">${d.descripcion}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
              <div>
                <div style="font-size:10px;color:var(--bone2);font-weight:700;margin-bottom:4px">RESPONSABILIDADES</div>
                ${d.responsabilidades.map(r=>`<div style="font-size:10px;color:var(--bone);margin-bottom:2px">• ${r}</div>`).join('')}
              </div>
              <div>
                <div style="font-size:10px;color:var(--bone2);font-weight:700;margin-bottom:4px">KPIs DEL ÁREA</div>
                ${d.kpis.map(k=>`<div style="font-size:10px;color:var(--bone2);margin-bottom:2px">→ ${k}</div>`).join('')}
              </div>
            </div>
            ${reworks>0?`<div style="font-size:10px;color:var(--red);margin-bottom:8px">⚠️ ${reworks} retrabajos (${reworkRate}%) en este departamento</div>`:''}
            <div style="font-size:10px;color:var(--bone2);font-weight:700;margin-bottom:4px">PARA MEJORAR:</div>
            ${d.necesidades.map(n=>`<div style="font-size:10px;color:var(--amber);margin-bottom:2px">💡 ${n}</div>`).join('')}
          </div>
        `;
      }).join('')}
    </div>

    <!-- FLUJO DE TRABAJO POR PROYECTO -->
    <div class="section-title">Flujo de trabajo por proyecto</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:20px">
      ${Object.entries(proyectoMap).sort((a,b)=>b[1].length-a[1].length).slice(0,6).map(([proj,acts])=>{
        const deptsFlujo=[...new Set(acts.map(a=>a.dept))];
        const totalH=acts.reduce((a,e)=>a+e.dur,0);
        const cost=acts.reduce((a,e)=>a+Math.round(e.dur*settings.rate),0);
        return `
          <div class="chart-card">
            <div style="font-size:13px;font-weight:800;color:var(--bone);margin-bottom:8px">${proj}</div>
            <div style="font-size:11px;color:var(--bone2);margin-bottom:10px">${acts.length} acciones · ${totalH.toFixed(1)}h · $${cost.toLocaleString()} MXN</div>
            <div style="font-size:10px;color:var(--bone2);font-weight:700;margin-bottom:6px">FLUJO DE DEPARTAMENTOS:</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">
              ${deptsFlujo.map((did,i)=>{
                const dept=DEPTS.find(d=>d.id===did);
                return dept?`<span style="background:${dept.color}20;border:1px solid ${dept.color}40;color:${dept.color};font-size:10px;padding:2px 8px;border-radius:10px">${dept.nombre}</span>${i<deptsFlujo.length-1?'<span style="color:var(--bone2);font-size:10px;align-self:center">→</span>':''}`:''
              }).join('')}
            </div>
            <div style="font-size:10px;color:var(--bone2)">Última acción: ${acts.sort((a,b)=>b.date.localeCompare(a.date))[0]?.desc?.slice(0,50)}...</div>
          </div>
        `;
      }).join('')}
    </div>

    <!-- ANÁLISIS: QUÉ NECESITA CADA DEPARTAMENTO -->
    <div class="section-title">Análisis de necesidades por área</div>
    <div class="chart-card" style="margin-bottom:20px">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
        ${DEPTS.map(d=>{
          const h=deptHoras[d.id]||0;
          const pct=Math.round(h/totalHoras*100);
          const isBusiest=h===maxHoras;
          return `
            <div style="padding:12px;background:var(--surface2);border-radius:8px;border:1px solid ${isBusiest?d.color:'var(--border)'}">
              <div style="font-size:12px;font-weight:700;color:${d.color};margin-bottom:4px">
                ${isBusiest?'🔥 ':''} ${d.nombre} ${isBusiest?'— MÁS CARGADO':''}
              </div>
              <div style="font-size:10px;color:var(--bone2);margin-bottom:8px">${pct}% del tiempo total · ${secsToHMS(Math.round(h*3600))}</div>
              ${d.necesidades.map(n=>`<div style="font-size:11px;color:var(--amber);margin-bottom:3px">→ ${n}</div>`).join('')}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

// ===== CLIENT MODE =====
let clientMode=false;
function toggleClientMode(){
  clientMode=!clientMode;
  document.body.classList.toggle('client-mode',clientMode);
  renderCurrentView();
}

// ===== INIT =====
init();

// ===== SERVICE WORKER (offline support) =====
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
